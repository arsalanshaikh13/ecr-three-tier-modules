name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - main
    paths:
      - "lirw-three-tier/frontend/**"
      - "lirw-three-tier/backend/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      build_frontend:
        description: "Build & Deploy Frontend?"
        type: boolean
        required: true
        default: true
      get_frontend:
        description: "Get Frontend image from ECR?"
        type: boolean
        required: true
        default: false
      build_backend:
        description: "Build & Deploy Backend?"
        type: boolean
        required: true
        default: true
      get_backend:
        description: "Get Backend image from ECR?"
        type: boolean
        required: true
        default: false
      run_seeding:
        description: "Build Seeder & Seed Database?"
        type: boolean
        required: true
        default: false

env:
  AWS_REGION: us-east-1
  # These are prefixes. The matrix will append '-frontend' or '-backend' to them
  ECS_CLUSTER: ${{ vars.PROJECT_NAME }}-cluster-${{ vars.ENV_VAR }}

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------
  # 1. DETECT CHANGES (Path Filtering)
  # ---------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths & Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      # We output the JSON array string here
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'lirw-three-tier/frontend/**'
            backend:
              - 'lirw-three-tier/backend/**'

      - name: Calculate Dynamic Matrix
        id: set-matrix
        run: |
          COMPONENTS=()

          # 1. PUSH EVENT: Only build based on path filters
          if [ "${{ github.event_name }}" == "push" ]; then
            if [ "${{ steps.filter.outputs.frontend }}" == "true" ]; then COMPONENTS+=("frontend"); fi
            if [ "${{ steps.filter.outputs.backend }}" == "true" ]; then COMPONENTS+=("backend"); fi

          # 2. MANUAL TRIGGER: Include if EITHER build or get is true
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Check Frontend
            if [[ "${{ inputs.build_frontend }}" == "true" || "${{ inputs.get_frontend }}" == "true" ]]; then
               COMPONENTS+=("frontend")
            fi
            # Check Backend
            if [[ "${{ inputs.build_backend }}" == "true" || "${{ inputs.get_backend }}" == "true" ]]; then
               COMPONENTS+=("backend")
            fi
          fi

          # Convert to JSON
          if [ ${#COMPONENTS[@]} -eq 0 ]; then
            MATRIX_JSON="[]"
          else
            MATRIX_JSON=$(printf '%s\n' "${COMPONENTS[@]}" | jq -R . | jq -s -c .)
          fi

          echo "Calculated Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
  # ---------------------------------------------------------
  # 2. BUILD & DEPLOY (Matrix for Frontend / Backend)
  # ---------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy ${{ matrix.component }}
    needs: detect-changes
    # CRITICAL: If the array is empty, skip this job entirely to prevent matrix errors
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This dynamically loads the array we built in the previous job
        component: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        # CRITICAL: If the array is empty, skip this job entirely to prevent matrix errors
        if: (inputs.build_frontend == true || inputs.build_backend == true) || github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Dynamically set repository based on matrix component
          ECR_REPOSITORY: lirw-ecr-${{ matrix.component }}-repo-${{ vars.ENV_VAR }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd lirw-three-tier/${{ matrix.component }}

          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
            
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Determine Image URI (Fetch from ECR)
        id: determine-image
        if: (inputs.get_frontend == true || inputs.get_backend == true) || github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: lirw-ecr-${{ matrix.component }}-repo-${{ vars.ENV_VAR }}

        run: |
          # 1. If the user left the input as 'latest', dynamically fetch the most recent tag from ECR
          echo "🔍 Fetching the most recently pushed image tag from ECR for $REPO_NAME..."

          # AWS CLI command to get the latest pushed image tag
          FETCHED_TAG=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)

          # Safety check: ensure we actually found a tag
          if [ "$FETCHED_TAG" == "None" ] || [ -z "$FETCHED_TAG" ]; then
            echo "❌ Error: Could not find any images in ECR repository $REPO_NAME"
            exit 1
          fi

          echo "✅ Found latest image tag: $FETCHED_TAG"
          echo "final_image=$ECR_REGISTRY/$ECR_REPOSITORY:$FETCHED_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        env:
          TASK_DEF_NAME: ${{ vars.PROJECT_NAME }}-${{ matrix.component }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF_NAME \
            --query taskDefinition > task-definition-${{ matrix.component }}.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-${{ matrix.component }}.json
          container-name: ${{ vars.PROJECT_NAME }}_${{ matrix.component }}
          image: ${{ steps.build-image.outputs.image || steps.determine-image.outputs.final_image  }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.component }}-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ---------------------------------------------------------
  # 3. DB SEEDING (Manual Only)
  # ---------------------------------------------------------
  seed-database:
    name: Build & Run DB Seeder
    runs-on: ubuntu-latest
    # ONLY runs on workflow dispatch AND if run_seeding is explicitly checked
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seeding == true }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Seeder Image
        id: build-seeder
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: lirw-ecr-database-seeder-repo-${{ vars.ENV_VAR }}
          IMAGE_TAG: ${{ github.sha }} # Use SHA for a unique tag
        run: |
          cd lirw-three-tier/database-seeder

          # Build and push with a unique tag AND the latest tag
          docker build --file=db.Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:seeder-latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # Output the unique image URI so the next step can use it
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current Seeder task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.PROJECT_NAME }}-db-seeder-${{ vars.ENV_VAR }} \
            --query taskDefinition > task-definition-seeder.json

      - name: Render new task definition with new image
        id: render-seeder-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-seeder.json
          # CRITICAL: Change this to match the container name in your Terraform db-seeder task definition!
          container-name: ${{ vars.PROJECT_NAME }}-db-seeder-${{ vars.ENV_VAR }}
          image: ${{ steps.build-seeder.outputs.image }}

      - name: Register new Task Definition
        id: register-task-def
        run: |
          # Register the updated JSON with AWS and capture the new Revision ARN
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-seeder-task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
            
          echo "task_def_arn=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Fetch Network IDs via AWS CLI
        id: lookup
        run: |
          # 1. Look up the Backend Security Group by its Name tag
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=ecs-node-backend-sg-${{ vars.ENV_VAR }}" \
            --query "SecurityGroups[0].GroupId" \
            --output text)

          # 2. Look up the Private Subnets by their Name tags
          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=pri-sub-*" \
            --query 'Subnets[*].SubnetId' \
            --output json | tr -d '\n' | tr -d ' ')

          if [ "$SG_ID" == "None" ] || [ -z "$SUBNETS" ]; then
            echo "Error: Could not find Security Group or Subnets"
            exit 1
          fi

          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT

      # - name: Trigger ECS Run-Task for Seeding
      #   run: |
      #     aws ecs run-task \
      #       --cluster ${{ env.ECS_CLUSTER }} \
      #       --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
      #       --launch-type EC2

      - name: Trigger and Wait for ECS DB Seeding
        run: |
          echo "Starting DB Seeding Task..."

          # 1. Run the task and capture the Task ARN
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
            --launch-type EC2 \
            --network-configuration '{
              "awsvpcConfiguration": {
                "subnets": ${{ steps.lookup.outputs.subnets }},
                "securityGroups": ["${{ steps.lookup.outputs.sg_id }}"]
                }
              }' \
            --query "tasks[0].taskArn" \
            --output text)
            
          echo "Task started with ARN: $TASK_ARN"
          echo "Waiting for task to complete..."

          # 2. Wait for the task to reach the 'STOPPED' state
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN
            
          echo "Task has stopped. Checking exit code..."

          # 3. Retrieve the exit code to ensure it didn't crash
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASK_ARN \
            --query "tasks[0].containers[0].exitCode" \
            --output text)
            
          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ Database seeding completed successfully!"
          else
            echo "❌ Database seeding FAILED with exit code: $EXIT_CODE"
            echo "Check ECS CloudWatch logs for the exact SQL error."
            exit 1 # This forces the GitHub Actions workflow to fail
          fi

      # - name: Trigger ECS Run-Task for Seeding
      #   run: |
      #     aws ecs run-task \
      #       --cluster ${{ env.ECS_CLUSTER }} \
      #       --task-definition db-seeder \
      #       --launch-type EC2 \
      #       --network-configuration '{
      #         "awsvpcConfiguration": {
