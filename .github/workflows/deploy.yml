name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - multi-env-action
      - three-tier-multi-env
    paths:
      - "lirw-three-tier/frontend/**"
      - "lirw-three-tier/backend/**"
      - "lirw-three-tier/probe/**"
  workflow_dispatch:
    inputs:
      action_type:
        description: "Run a normal deploy flow or trigger a manual rollback"
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - rollback
      target_environment:
        description: "Target environment to deploy"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
          - all
      # Replaces the build_frontend/get_frontend boolean pair.
      # A single choice makes the intent unambiguous and prevents operators from
      # accidentally enabling both flags at once (which silently favoured "build").
      frontend_image_strategy:
        description: "Frontend image strategy"
        type: choice
        required: true
        default: build
        options:
          - build # Build a fresh image and push to ECR
          - fetch # Reuse the latest image already in ECR
          - skip # Do not include frontend in this run
      # Same replacement for the backend boolean pair.
      backend_image_strategy:
        description: "Backend image strategy"
        type: choice
        required: true
        default: build
        options:
          - build
          - fetch
          - skip
      run_seeding:
        description: "Build Seeder & Seed Database?"
        type: boolean
        required: true
        default: false
      default_launch_type:
        description: "Default launch type for jobs that support runtime overrides."
        type: choice
        required: true
        default: EC2
        options:
          - EC2
          - FARGATE
      default_network_mode:
        description: "Default network mode for jobs that support runtime overrides."
        type: choice
        required: true
        default: non-awsvpc
        options:
          - non-awsvpc
          - awsvpc
      release_version:
        description: "Optional immutable release version. Required for prod-targeting guarded runs unless break-glass is used."
        type: string
        required: false
      change_ticket:
        description: "Optional change ticket or approval reference. Required for prod-targeting guarded runs unless break-glass is used."
        type: string
        required: false
      break_glass_reason:
        description: "Optional emergency override reason for guarded prod operations."
        type: string
        required: false
      enable_security_scan:
        description: "Run the pluggable image security gate during deploy preparation?"
        type: boolean
        required: true
        default: false
      enable_sbom:
        description: "Generate an SBOM for the resolved deploy image?"
        type: boolean
        required: true
        default: false
      enable_telemetry_gate:
        description: "Evaluate CloudWatch release-health alarms after probe succeeds?"
        type: boolean
        required: true
        default: false
      observation_window_minutes:
        description: "Minutes to observe release health before reading CloudWatch alarms."
        type: string
        required: true
        default: "5"
      vulnerability_threshold:
        description: "Severity threshold passed into the image security gate when enabled."
        type: choice
        required: true
        default: CRITICAL
        options:
          - CRITICAL
          - HIGH,CRITICAL
      rollback_component:
        description: "Component to roll back when action_type is rollback"
        type: choice
        required: false
        default: backend
        options:
          - frontend
          - backend
      rollback_task_definition_arn:
        description: "Optional explicit task definition ARN for manual rollback"
        type: string
        required: false
      rollback_manifest_s3_key:
        description: "Optional S3 manifest key whose task_definition_arn should be rolled back"
        type: string
        required: false

permissions:
  id-token: write
  contents: read

# Prevent parallel deploys to the same environment from racing on ECS service
# updates, SSM pointer writes, and overlapping probe evaluations.
concurrency:
  group: deploy-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'dev' }}
  cancel-in-progress: false

jobs:
  predeploy-guardrails:
    name: Predeploy Guardrails
    # Keep governance in a reusable workflow so release policy can evolve independently from
    # deploy mechanics. This lets us bolt on stronger prod controls without hardwiring them
    # across every job in deploy.yml.
    uses: ./.github/workflows/reusable-predeploy-guardrails.yml
    with:
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'dev' }}
      action_type: ${{ github.event_name == 'workflow_dispatch' && inputs.action_type || 'deploy' }}
      release_version: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
      change_ticket: ${{ github.event_name == 'workflow_dispatch' && inputs.change_ticket || '' }}
      break_glass_reason: ${{ github.event_name == 'workflow_dispatch' && inputs.break_glass_reason || '' }}
      freeze_windows_utc: ${{ vars.PROD_FREEZE_WINDOWS_UTC || '' }}

  # ---------------------------------------------------------
  # 1. DETECT CHANGES (Path Filtering)
  # ---------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths & Setup Matrix
    needs: predeploy-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Push events always target dev only -- production deploys must be triggered manually.
    # This policy ensures push-based automation cannot reach prod without an explicit operator
    # decision, even if the commit touches prod-relevant code paths.
    # Manual dispatch is the only path to prod (or to running both envs in parallel via "all").
    outputs:
      # Component+environment object matrix consumed by build-and-deploy and rollback jobs.
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      # Prod-only subset -- used by jobs that should run on prod always but on dev only
      # when explicitly requested (e.g. notifications on push events).
      prod_matrix: ${{ steps.set-matrix.outputs.prod_matrix }}
      # Environment-only list for jobs that are per-environment, not per-component (probe, seed).
      env_matrix: ${{ steps.set-matrix.outputs.env_matrix }}
      # Pre-computed boolean that collapses the telemetry gate condition.
      # True when: manual dispatch with enable_telemetry_gate=true and at least one component
      # in scope, OR when prod is targeted (prod always gets telemetry regardless of the toggle).
      # Computed here so downstream job if blocks stay readable single-condition checks.
      run_telemetry_gate: ${{ steps.set-matrix.outputs.run_telemetry_gate }}
      # Pre-computed matrix for telemetry gate jobs. Resolves the conditional "full matrix vs
      # prod-only matrix" selection that previously lived as a fragile || expression inside
      # each job's matrix.include key.
      telemetry_matrix: ${{ steps.set-matrix.outputs.telemetry_matrix }}
      # Pre-computed matrix for deploy-started notifications.
      # Dispatch runs notify for every component in scope (full matrix).
      # Push runs notify only when prod is affected (prod_matrix) to avoid spamming
      # notifications for routine dev-targeting pushes.
      notify_matrix: ${{ steps.set-matrix.outputs.notify_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Push-based change detection should compare the pushed revision against the
          # commit that immediately preceded it, not against main. Fetching a little
          # extra history makes that comparison available inside the runner.
          fetch-depth: 2

      - name: Resolve safe diff base for push events
        id: diff-base
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"
          BEFORE_SHA="${{ github.event.before }}"

          # Normal pushes provide a real "before" SHA and should diff against that exact
          # previous revision. This keeps path filtering scoped to the current push instead
          # of drifting toward a long-lived branch vs main comparison.
          if [ "$BEFORE_SHA" != "$ZERO_SHA" ]; then
            echo "base=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
            echo "use_fallback_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Some first-push or branch-creation events surface an all-zero SHA. In that case,
          # prefer the local parent commit when available instead of falling back to main,
          # because main would reintroduce the "branch always looks changed" problem.
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "base=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
            echo "use_fallback_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If even a parent commit is unavailable, treat monitored app areas as changed.
          # This intentionally biases toward running CI/CD once on the first push rather than
          # silently skipping deployable code because no safe diff base exists.
          echo "base=" >> "$GITHUB_OUTPUT"
          echo "use_fallback_scan=true" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        if: ${{ steps.diff-base.outputs.use_fallback_scan != 'true' }}
        with:
          # On push events, anchor change detection to the exact before/after SHAs from
          # the webhook payload so feature branches do not look "changed forever" just
          # because they differ from main. Manual dispatch remains the path for workflow testing.
          base: ${{ steps.diff-base.outputs.base }}
          ref: ${{ github.sha }}
          filters: |
            frontend:
              - 'lirw-three-tier/frontend/**'
            backend:
              - 'lirw-three-tier/backend/**'
            probe:
              - 'lirw-three-tier/probe/**'

      - name: Fallback path flags for zero-SHA first push
        id: filter-fallback
        if: ${{ steps.diff-base.outputs.use_fallback_scan == 'true' }}
        shell: bash
        run: |
          # This fallback is intentionally simple: if GitHub did not give us a usable diff
          # base and the local clone has no parent commit to compare against, assume the
          # monitored app surfaces changed for this first push.
          echo "frontend=true" >> "$GITHUB_OUTPUT"
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "probe=true" >> "$GITHUB_OUTPUT"

      - name: Calculate Dynamic Matrix
        id: set-matrix
        uses: ./.github/actions/compute-deploy-matrix
        with:
          event_name: ${{ github.event_name }}
          frontend_changed: ${{ steps.filter.outputs.frontend || steps.filter-fallback.outputs.frontend || 'false' }}
          backend_changed: ${{ steps.filter.outputs.backend || steps.filter-fallback.outputs.backend || 'false' }}
          action_type: ${{ github.event_name == 'workflow_dispatch' && inputs.action_type || 'deploy' }}
          target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'dev' }}
          frontend_image_strategy: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_image_strategy || 'build' }}
          backend_image_strategy: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_image_strategy || 'build' }}
          enable_telemetry_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_telemetry_gate || 'false' }}


  # ---------------------------------------------------------
  # 2. BUILD & DEPLOY (Matrix for Frontend / Backend)
  # ---------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy ${{ matrix.component }} (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes]
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-deploy-service.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      project_name: ${{ vars.PROJECT_NAME }}
      release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
      enable_security_scan: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_security_scan || false }}
      enable_sbom: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_sbom || false }}
      vulnerability_threshold: ${{ github.event_name == 'workflow_dispatch' && inputs.vulnerability_threshold || 'CRITICAL' }}
      service_network_mode: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_network_mode) || vars.SERVICE_NETWORK_MODE }}
      # Per-component networking lets frontend and backend evolve toward separate subnet
      # groups independently without teaching the reusable workflow about tiers.
      subnet_tag_values: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_SUBNET_TAG_VALUES) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_SUBNET_TAG_VALUES) || vars.SERVICE_SUBNET_TAG_VALUES || '' }}
      security_group_name: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_SECURITY_GROUP_NAME) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_SECURITY_GROUP_NAME) || vars.SERVICE_SECURITY_GROUP_NAME || '' }}
      assign_public_ip: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_ASSIGN_PUBLIC_IP) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_ASSIGN_PUBLIC_IP) || vars.SERVICE_ASSIGN_PUBLIC_IP || '' }}
      # Image policy is caller-owned: deploy.yml decides what to build/fetch; the reusable
      # workflow executes the strategy without needing to know which event triggered it.
      # Push events always build fresh. Manual runs use the per-component strategy choice.
      build_image: ${{ github.event_name == 'push' || (matrix.component == 'frontend' && inputs.frontend_image_strategy == 'build') || (matrix.component == 'backend' && inputs.backend_image_strategy == 'build') }}
      fetch_image: ${{ github.event_name == 'workflow_dispatch' && ((matrix.component == 'frontend' && inputs.frontend_image_strategy == 'fetch') || (matrix.component == 'backend' && inputs.backend_image_strategy == 'fetch')) }}
    secrets: inherit

  notify-deploy-started:
    name: Notify Deploy Started ${{ matrix.component }} (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes]
    if: ${{ needs.detect-changes.outputs.notify_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        # notify_matrix is pre-computed in detect-changes:
        # dispatch -> full matrix (all components in scope get a notification)
        # push     -> prod_matrix (no-op for now since push never reaches prod)
        include: ${{ fromJson(needs.detect-changes.outputs.notify_matrix) }}
    uses: ./.github/workflows/reusable-send-notification.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      notification_event: deploy_started
      status: in_progress
      project_name: ${{ vars.PROJECT_NAME }}
      release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
      change_ticket: ${{ github.event_name == 'workflow_dispatch' && inputs.change_ticket || '' }}
      workflow_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      summary: ${{ github.event_name == 'workflow_dispatch' && 'Manual deploy request entered the reusable deploy/probe/telemetry workflow graph.' || 'Push-triggered deploy entered the reusable deploy/probe/telemetry workflow graph.' }}
    secrets: inherit

  # ---------------------------------------------------------
  # 3. POST-DEPLOY PROBE (Runs once per environment)
  # ---------------------------------------------------------
  probe-app:
    name: Probe App (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes, build-and-deploy]
    # env_matrix is derived from the same TARGET_ENVS as matrix -- if one is empty, both are.
    # A single guard is sufficient; the redundant matrix != '[]' check has been removed.
    if: ${{ needs.detect-changes.outputs.env_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.env_matrix) }}
    uses: ./.github/workflows/reusable-probe-environment.yml
    with:
      environment: ${{ matrix.environment }}
      project_name: ${{ vars.PROJECT_NAME }}
      build_image: true
      fetch_image: false
      # Probes always run on Fargate/awsvpc for faster task stop times.
      # EC2-backed tasks take significantly longer to drain, which inflates probe durations
      # and delays the rollback trigger window when validation fails.
      probe_launch_type: FARGATE
      probe_network_mode: awsvpc
    secrets: inherit

  # ---------------------------------------------------------
  # 4. POST-PROBE TELEMETRY GATE
  # ---------------------------------------------------------
  evaluate-release-health:
    name: Evaluate Release Health ${{ matrix.component }} (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes, build-and-deploy, probe-app]
    # run_telemetry_gate and telemetry_matrix are both computed in detect-changes, so the
    # gate condition and its matrix source stay in sync automatically.
    if: ${{ always() && needs.probe-app.result == 'success' && needs.detect-changes.outputs.run_telemetry_gate == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.telemetry_matrix) }}
    uses: ./.github/workflows/reusable-evaluate-release-health.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      project_name: ${{ vars.PROJECT_NAME }}
      observation_window_minutes: ${{ (github.event_name == 'workflow_dispatch' && inputs.observation_window_minutes) || '5' }}
      alarm_names: ${{ (matrix.component == 'frontend' && vars.FRONTEND_RELEASE_ALARM_NAMES) || (matrix.component == 'backend' && vars.BACKEND_RELEASE_ALARM_NAMES) || '' }}
    secrets: inherit

  # ---------------------------------------------------------
  # 5. ROLLBACK (Use SSM last-known-good pointer when probe/telemetry fails)
  # ---------------------------------------------------------
  rollback:
    name: Roll Back ${{ matrix.component }} (${{ matrix.environment }})
    needs:
      [
        predeploy-guardrails,
        detect-changes,
        build-and-deploy,
        probe-app,
        evaluate-release-health,
      ]
    if: ${{ always() && needs.detect-changes.outputs.matrix != '[]' && (needs.probe-app.result == 'failure' || needs.evaluate-release-health.result == 'failure') }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-auto-rollback.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      project_name: ${{ vars.PROJECT_NAME }}
      service_launch_type: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_launch_type) || '' }}
      service_network_mode: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_network_mode) || '' }}
      security_group_name: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_SECURITY_GROUP_NAME) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_SECURITY_GROUP_NAME) || vars.SERVICE_SECURITY_GROUP_NAME || '' }}
      subnet_tag_values: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_SUBNET_TAG_VALUES) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_SUBNET_TAG_VALUES) || vars.SERVICE_SUBNET_TAG_VALUES || '' }}
      assign_public_ip: ${{ (matrix.component == 'frontend' && vars.FRONTEND_SERVICE_ASSIGN_PUBLIC_IP) || (matrix.component == 'backend' && vars.BACKEND_SERVICE_ASSIGN_PUBLIC_IP) || vars.SERVICE_ASSIGN_PUBLIC_IP || '' }}
    secrets: inherit

  # ---------------------------------------------------------
  # 5b. VERIFY AUTO ROLLBACK RECOVERY
  # ---------------------------------------------------------
  verify-rollback-recovery:
    name: Verify Rollback Recovery (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes, rollback]
    if: ${{ always() && needs.rollback.result == 'success' && needs.detect-changes.outputs.env_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.env_matrix) }}
    uses: ./.github/workflows/reusable-probe-environment.yml
    with:
      environment: ${{ matrix.environment }}
      project_name: ${{ vars.PROJECT_NAME }}
      # Fetch-only: the probe image was already published during the forward deploy probe.
      # Rebuilding here would mutate probe artifacts and obscure whether the issue was
      # in the app image or the probe itself.
      build_image: false
      fetch_image: true
      probe_launch_type: FARGATE
      probe_network_mode: awsvpc
      # Pointer advancement is disabled -- this probe is confirming recovery, not promoting
      # a new revision. Advancing the pointer here would corrupt the last-known-good reference.
      update_pointers_on_success: false
      probe_purpose: rollback_verification
    secrets: inherit

  # ---------------------------------------------------------
  # 5c. TELEMETRY GATE AFTER AUTO ROLLBACK VERIFICATION
  # ---------------------------------------------------------
  evaluate-rollback-health:
    name: Evaluate Rollback Health ${{ matrix.component }} (${{ matrix.environment }})
    needs:
      [predeploy-guardrails, detect-changes, rollback, verify-rollback-recovery]
    if: ${{ always() && needs.rollback.result == 'success' && needs.verify-rollback-recovery.result == 'success' && needs.detect-changes.outputs.run_telemetry_gate == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.telemetry_matrix) }}
    uses: ./.github/workflows/reusable-evaluate-release-health.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      project_name: ${{ vars.PROJECT_NAME }}
      observation_window_minutes: ${{ (github.event_name == 'workflow_dispatch' && inputs.observation_window_minutes) || '5' }}
      alarm_names: ${{ (matrix.component == 'frontend' && vars.FRONTEND_RELEASE_ALARM_NAMES) || (matrix.component == 'backend' && vars.BACKEND_RELEASE_ALARM_NAMES) || '' }}
      health_purpose: rollback_verification
    secrets: inherit

  # ---------------------------------------------------------
  # 6. MANUAL ROLLBACK (Workflow dispatch only)
  # ---------------------------------------------------------
  manual-rollback:
    name: Manual Roll Back ${{ inputs.rollback_component }} (${{ inputs.target_environment }})
    needs: predeploy-guardrails
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action_type == 'rollback' }}
    uses: ./.github/workflows/reusable-manual-rollback.yml
    with:
      environment: ${{ inputs.target_environment }}
      component: ${{ inputs.rollback_component }}
      project_name: ${{ vars.PROJECT_NAME }}
      service_launch_type: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_launch_type) || '' }}
      service_network_mode: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_network_mode) || '' }}
      security_group_name: ${{ (inputs.rollback_component == 'frontend' && vars.FRONTEND_SERVICE_SECURITY_GROUP_NAME) || (inputs.rollback_component == 'backend' && vars.BACKEND_SERVICE_SECURITY_GROUP_NAME) || vars.SERVICE_SECURITY_GROUP_NAME || '' }}
      subnet_tag_values: ${{ (inputs.rollback_component == 'frontend' && vars.FRONTEND_SERVICE_SUBNET_TAG_VALUES) || (inputs.rollback_component == 'backend' && vars.BACKEND_SERVICE_SUBNET_TAG_VALUES) || vars.SERVICE_SUBNET_TAG_VALUES || '' }}
      assign_public_ip: ${{ (inputs.rollback_component == 'frontend' && vars.FRONTEND_SERVICE_ASSIGN_PUBLIC_IP) || (inputs.rollback_component == 'backend' && vars.BACKEND_SERVICE_ASSIGN_PUBLIC_IP) || vars.SERVICE_ASSIGN_PUBLIC_IP || '' }}
      rollback_task_definition_arn: ${{ inputs.rollback_task_definition_arn }}
      rollback_manifest_s3_key: ${{ inputs.rollback_manifest_s3_key }}
    secrets: inherit

  # ---------------------------------------------------------
  # 6b. VERIFY MANUAL ROLLBACK RECOVERY
  # ---------------------------------------------------------
  verify-manual-rollback-recovery:
    name: Verify Manual Rollback Recovery (${{ inputs.target_environment }})
    needs: [predeploy-guardrails, manual-rollback]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action_type == 'rollback' && needs.manual-rollback.result == 'success' }}
    uses: ./.github/workflows/reusable-probe-environment.yml
    with:
      environment: ${{ inputs.target_environment }}
      project_name: ${{ vars.PROJECT_NAME }}
      build_image: false
      fetch_image: true
      probe_launch_type: FARGATE
      probe_network_mode: awsvpc
      update_pointers_on_success: false
      probe_purpose: rollback_verification
    secrets: inherit

  # ---------------------------------------------------------
  # 6c. TELEMETRY GATE AFTER MANUAL ROLLBACK VERIFICATION
  # ---------------------------------------------------------
  evaluate-manual-rollback-health:
    name: Evaluate Manual Rollback Health (${{ inputs.target_environment }})
    needs:
      [predeploy-guardrails, manual-rollback, verify-manual-rollback-recovery]
    # Manual rollback telemetry runs when:
    #   - prod is targeted (always gets telemetry), OR
    #   - the operator explicitly enabled the gate on a dev run.
    # Additionally, guard on alarm_names being configured -- no alarms means nothing to evaluate.
    if: >-
      ${{
        always()
        && needs.manual-rollback.result == 'success'
        && needs.verify-manual-rollback-recovery.result == 'success'
        && (inputs.target_environment == 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_telemetry_gate == true))
        && ((inputs.rollback_component == 'frontend' && vars.FRONTEND_RELEASE_ALARM_NAMES != '')
            || (inputs.rollback_component == 'backend' && vars.BACKEND_RELEASE_ALARM_NAMES != ''))
      }}
    uses: ./.github/workflows/reusable-evaluate-release-health.yml
    with:
      environment: ${{ inputs.target_environment }}
      component: ${{ inputs.rollback_component }}
      project_name: ${{ vars.PROJECT_NAME }}
      observation_window_minutes: ${{ inputs.observation_window_minutes }}
      alarm_names: ${{ (inputs.rollback_component == 'frontend' && vars.FRONTEND_RELEASE_ALARM_NAMES) || (inputs.rollback_component == 'backend' && vars.BACKEND_RELEASE_ALARM_NAMES) || '' }}
      health_purpose: rollback_verification
    secrets: inherit

  # ---------------------------------------------------------
  # 7. DB SEEDING (Manual Only)
  # ---------------------------------------------------------
  seed-database:
    name: Build & Run DB Seeder
    needs: [predeploy-guardrails, detect-changes]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seeding == true && needs.detect-changes.outputs.env_matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.env_matrix) }}
    uses: ./.github/workflows/reusable-seed-database.yml
    with:
      environment: ${{ matrix.environment }}
      project_name: ${{ vars.PROJECT_NAME }}
      build_image: true
      fetch_image: false
      seeder_launch_type: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_launch_type) || vars.SEEDER_LAUNCH_TYPE }}
      seeder_network_mode: ${{ (github.event_name == 'workflow_dispatch' && inputs.default_network_mode) || vars.SEEDER_NETWORK_MODE }}
      seeder_security_group_name: ${{ vars.SEEDER_SECURITY_GROUP_NAME || '' }}
      seeder_subnet_tag_values: ${{ vars.SEEDER_SUBNET_TAG_VALUES || '' }}
      seeder_assign_public_ip: ${{ vars.SEEDER_ASSIGN_PUBLIC_IP || '' }}
    secrets: inherit

  # ----- Deploy outcome resolution -----
  # Computes the terminal deploy state from upstream job results. This must be an
  # inline job because it needs access to needs.<job>.result which is only available
  # in the calling workflow, not inside a reusable workflow.
  resolve-deploy-outcome:
    name: Resolve Deploy Outcome ${{ matrix.component }} (${{ matrix.environment }})
    needs:
      [
        predeploy-guardrails,
        detect-changes,
        build-and-deploy,
        probe-app,
        evaluate-release-health,
        rollback,
        verify-rollback-recovery,
        evaluate-rollback-health,
      ]
    if: ${{ always() && needs.detect-changes.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      event: ${{ steps.status.outputs.event }}
      status: ${{ steps.status.outputs.status }}
      summary: ${{ steps.status.outputs.summary }}
    steps:
      - name: Resolve terminal deploy event
        id: status
        shell: bash
        run: |
          set -euo pipefail

          # ----- job result inputs -------------------------------------------
          BUILD_RESULT="${{ needs.build-and-deploy.result }}"
          PROBE_RESULT="${{ needs.probe-app.result }}"
          TELEMETRY_RESULT="${{ needs.evaluate-release-health.result }}"
          ROLLBACK_RESULT="${{ needs.rollback.result }}"
          VERIFY_ROLLBACK_RESULT="${{ needs.verify-rollback-recovery.result }}"
          ROLLBACK_TELEMETRY_RESULT="${{ needs.evaluate-rollback-health.result }}"

          # ----- default terminal outcome -----------------------------------
          # Default: something failed and we don't know exactly where.
          EVENT="deploy_failed"
          STATUS="failure"
          SUMMARY="Deployment did not reach a healthy terminal state."

          # ----- terminal outcome resolution --------------------------------
          # Evaluate states from most-recovered to least, so the most specific outcome wins.
          if [[ "$BUILD_RESULT" == "success" && "$PROBE_RESULT" == "success"
                && ( "$TELEMETRY_RESULT" == "success" || "$TELEMETRY_RESULT" == "skipped" ) ]]; then
            EVENT="deploy_succeeded"
            STATUS="success"
            SUMMARY="Deployment completed successfully and any enabled telemetry gate passed."

          elif [[ "$BUILD_RESULT" == "failure" ]]; then
            # Build failed before probe could run -- distinguish from a post-deploy failure
            # so operators know whether to investigate the image build or the running service.
            EVENT="build_failed"
            STATUS="failure"
            SUMMARY="Image build or ECS service update failed before probe could run."

          elif [[ "$ROLLBACK_RESULT" == "success" && "$VERIFY_ROLLBACK_RESULT" == "success"
                  && ( "$ROLLBACK_TELEMETRY_RESULT" == "success" || "$ROLLBACK_TELEMETRY_RESULT" == "skipped" ) ]]; then
            EVENT="rollback_recovered"
            STATUS="recovered"
            SUMMARY="Deployment failure triggered rollback, and rollback verification completed successfully."

          elif [[ "$ROLLBACK_RESULT" == "success"
                  && ( "$VERIFY_ROLLBACK_RESULT" == "failure" || "$ROLLBACK_TELEMETRY_RESULT" == "failure" ) ]]; then
            EVENT="rollback_verification_failed"
            STATUS="failure"
            SUMMARY="Rollback executed, but post-rollback verification or rollback telemetry still reported the environment unhealthy."

          elif [[ "$ROLLBACK_RESULT" == "failure" ]]; then
            EVENT="rollback_failed"
            STATUS="failure"
            SUMMARY="Rollback was triggered but did not complete successfully."

          elif [[ "$PROBE_RESULT" == "failure" || "$TELEMETRY_RESULT" == "failure" ]]; then
            EVENT="rollback_triggered"
            STATUS="degraded"
            SUMMARY="Deployment validation failed and rollback handling was triggered."
          fi

          # ----- action outputs ----------------------------------------------
          echo "event=$EVENT"     >> "$GITHUB_OUTPUT"
          echo "status=$STATUS"   >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

          # ----- job summary render -------------------------------------------
          {
            echo "## Deploy Outcome: $EVENT"
            echo "**Status**: \`$STATUS\`"
            echo "**Summary**: $SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

  # ----- Deploy outcome notification -----
  notify-deploy-outcome:
    name: Notify Deploy Outcome ${{ matrix.component }} (${{ matrix.environment }})
    needs: [predeploy-guardrails, detect-changes, resolve-deploy-outcome]
    if: ${{ always() && needs.detect-changes.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-send-notification.yml
    with:
      environment: ${{ matrix.environment }}
      component: ${{ matrix.component }}
      notification_event: ${{ needs.resolve-deploy-outcome.outputs.event }}
      status: ${{ needs.resolve-deploy-outcome.outputs.status }}
      project_name: ${{ vars.PROJECT_NAME }}
      release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
      change_ticket: ${{ github.event_name == 'workflow_dispatch' && inputs.change_ticket || '' }}
      workflow_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      summary: ${{ needs.resolve-deploy-outcome.outputs.summary }}
    secrets: inherit

  # ----- Manual rollback outcome resolution -----
  resolve-manual-rollback-outcome:
    name: Resolve Manual Rollback Outcome (${{ inputs.target_environment }})
    needs:
      [
        predeploy-guardrails,
        manual-rollback,
        verify-manual-rollback-recovery,
        evaluate-manual-rollback-health,
      ]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action_type == 'rollback' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      event: ${{ steps.status.outputs.event }}
      status: ${{ steps.status.outputs.status }}
      summary: ${{ steps.status.outputs.summary }}
    steps:
      - name: Resolve terminal manual rollback event
        id: status
        shell: bash
        run: |
          set -euo pipefail

          # ----- job result inputs -------------------------------------------
          ROLLBACK_RESULT="${{ needs.manual-rollback.result }}"
          VERIFY_RESULT="${{ needs.verify-manual-rollback-recovery.result }}"
          TELEMETRY_RESULT="${{ needs.evaluate-manual-rollback-health.result }}"

          # ----- default terminal outcome -----------------------------------
          EVENT="manual_rollback_failed"
          STATUS="failure"
          SUMMARY="Manual rollback did not complete successfully."

          # ----- terminal outcome resolution --------------------------------
          if [[ "$ROLLBACK_RESULT" == "success" && "$VERIFY_RESULT" == "success"
                && ( "$TELEMETRY_RESULT" == "success" || "$TELEMETRY_RESULT" == "skipped" ) ]]; then
            EVENT="manual_rollback_succeeded"
            STATUS="success"
            SUMMARY="Manual rollback completed successfully and post-rollback validation reported the environment healthy."

          elif [[ "$ROLLBACK_RESULT" == "success"
                  && ( "$VERIFY_RESULT" == "failure" || "$TELEMETRY_RESULT" == "failure" ) ]]; then
            EVENT="manual_rollback_verification_failed"
            STATUS="failure"
            SUMMARY="Manual rollback executed, but rollback verification or rollback telemetry still reported the environment unhealthy."
          fi

          echo "event=$EVENT"     >> "$GITHUB_OUTPUT"
          echo "status=$STATUS"   >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

          # ----- job summary render -------------------------------------------
          {
            echo "## Manual Rollback Outcome: $EVENT"
            echo "**Status**: \`$STATUS\`"
            echo "**Summary**: $SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

  # ----- Manual rollback outcome notification -----
  notify-manual-rollback-outcome:
    name: Notify Manual Rollback Outcome (${{ inputs.target_environment }})
    needs: [predeploy-guardrails, resolve-manual-rollback-outcome]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action_type == 'rollback' }}
    uses: ./.github/workflows/reusable-send-notification.yml
    with:
      environment: ${{ inputs.target_environment }}
      component: ${{ inputs.rollback_component }}
      notification_event: ${{ needs.resolve-manual-rollback-outcome.outputs.event }}
      status: ${{ needs.resolve-manual-rollback-outcome.outputs.status }}
      project_name: ${{ vars.PROJECT_NAME }}
      release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
      change_ticket: ${{ inputs.change_ticket || '' }}
      workflow_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      summary: ${{ needs.resolve-manual-rollback-outcome.outputs.summary }}
    secrets: inherit
