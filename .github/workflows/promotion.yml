name: Promote Image To Prod

on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: "Lower environment whose successful manifests should be used as the promotion source"
        type: choice
        required: true
        default: dev
        options:
          - dev
      source_region:
        description: "AWS region that holds the source ECR repositories"
        type: choice
        required: true
        default: us-east-1
        options:
          - us-east-1
      promote_frontend:
        description: "Promote frontend image to the prod ECR repository?"
        type: boolean
        required: true
        default: true
      promote_backend:
        description: "Promote backend image to the prod ECR repository?"
        type: boolean
        required: true
        default: true
      frontend_manifest_s3_key:
        description: "Optional successful frontend manifest key in S3. Leave empty to use the latest successful manifest."
        type: string
        required: false
      backend_manifest_s3_key:
        description: "Optional successful backend manifest key in S3. Leave empty to use the latest successful manifest."
        type: string
        required: false
      run_seeding_in_prod:
        description: "Trigger prod seeding when dispatching deploy.yml"
        type: boolean
        required: true
        default: false
      default_launch_type:
        description: "Default launch type to pass into the triggered prod deploy workflow."
        type: choice
        required: true
        default: EC2
        options:
          - EC2
          - FARGATE
      default_network_mode:
        description: "Default network mode to pass into the triggered prod deploy workflow."
        type: choice
        required: true
        default: non-awsvpc
        options:
          - non-awsvpc
          - awsvpc
      release_version:
        description: "Immutable release version for the promoted prod deployment."
        type: string
        required: false
      change_ticket:
        description: "Change ticket or approval reference for prod promotion."
        type: string
        required: false
      break_glass_reason:
        description: "Optional emergency override reason for prod promotion."
        type: string
        required: false
      enable_security_scan:
        description: "Whether the triggered prod deploy should run the image security gate."
        type: boolean
        required: true
        default: false
      enable_sbom:
        description: "Whether the triggered prod deploy should generate an SBOM for the resolved image."
        type: boolean
        required: true
        default: false
      vulnerability_threshold:
        description: "Severity threshold for the triggered prod deploy security gate."
        type: choice
        required: true
        default: CRITICAL
        options:
          - CRITICAL
          - HIGH,CRITICAL

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  predeploy-guardrails:
    name: Predeploy Guardrails
    uses: ./.github/workflows/reusable-predeploy-guardrails.yml
    with:
      target_environment: prod
      action_type: deploy
      release_version: ${{ inputs.release_version }}
      change_ticket: ${{ inputs.change_ticket }}
      break_glass_reason: ${{ inputs.break_glass_reason }}

  notify-prod-approval-requested:
    name: Notify Prod Approval Requested
    needs: predeploy-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials for notification publishing
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.PROD_AWS_REGION || 'us-east-2' }}

      - name: Publish prod approval request notification
        uses: ./.github/actions/send-release-notification
        with:
          topic_arn: ${{ vars.PROD_RELEASE_NOTIFICATIONS_TOPIC_ARN || '' }}
          aws_region: ${{ vars.PROD_AWS_REGION || 'us-east-2' }}
          notification_event: prod_approval_requested
          project_name: ${{ vars.PROJECT_NAME }}
          environment: prod
          status: pending_approval
          release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
          change_ticket: ${{ inputs.change_ticket }}
          workflow_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          summary: "${{ format('Promotion from {0} is waiting for prod approval. Frontend selected: {1}. Backend selected: {2}.', inputs.source_environment, inputs.promote_frontend, inputs.promote_backend) }}"

  prod-approval:
    name: Prod Approval Gate
    needs: [predeploy-guardrails, notify-prod-approval-requested]
    runs-on: ubuntu-latest
    # Keep approval on a dedicated environment so human release authorization is separated
    # from the actual prod execution job. This avoids mixing policy checks, approval, and
    # artifact promotion into one environment boundary.
    environment: prod-approval
    steps:
      - name: Publish approval context
        shell: bash
        run: |
          # ----- approval context rendering ----------------------------------
          {
            echo "## Prod Approval Context"
            echo "- Source environment: \`${{ inputs.source_environment }}\`"
            echo "- Release version: \`${{ needs.predeploy-guardrails.outputs.resolved_release_version }}\`"
            echo "- Change ticket: \`${{ inputs.change_ticket || 'not-provided' }}\`"
            echo "- Break glass: \`${{ inputs.break_glass_reason != '' }}\`"
            echo
            echo "Approval on \`prod-approval\` authorizes the release."
            echo "The actual image promotion and prod deployment dispatch happen in the next job."
          } >> "$GITHUB_STEP_SUMMARY"

  promote-and-dispatch:
    name: Promote Approved Images And Trigger Prod Deploy
    needs: [predeploy-guardrails, prod-approval]
    runs-on: ubuntu-latest
    # The execution job still binds to prod so it can use prod-scoped vars and secrets,
    # but reviewer gating should now live on the separate prod-approval environment.
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate promotion inputs
        shell: bash
        run: |
          # ----- input validation --------------------------------------------
          if [[ "${{ inputs.promote_frontend }}" != "true" && "${{ inputs.promote_backend }}" != "true" ]]; then
            echo "Error: at least one component must be selected for promotion."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to destination Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote approved images into prod ECR
        id: promote-images
        shell: bash
        run: |
          set -euo pipefail

          # ----- path & summary initialization --------------------------------
          mkdir -p promotion-manifests
          SUMMARY_FILE="promotion-manifests/promotion-summary.md"
          touch "$SUMMARY_FILE"

          # ----- variable normalization ---------------------------------------
          DESTINATION_REGION="${{ vars.AWS_REGION }}"
          DESTINATION_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SOURCE_REGION="${{ inputs.source_region }}"
          SOURCE_ENV="${{ inputs.source_environment }}"
          PROJECT="${{ vars.PROJECT_NAME }}"

          # ----- manifest bucket resolution -----------------------------------
          # BUCKET="${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}"
          # resolves to: lirw-ecs-deployment-manifests-dev
          BUCKET="${{ vars.DEPLOYMENT_MANIFEST_BUCKET_PREFIX }}-${SOURCE_ENV}"

          echo "DESTINATION_REGION: $DESTINATION_REGION"
          echo "DESTINATION_REGISTRY: $DESTINATION_REGISTRY"
          echo "SOURCE_REGION: $SOURCE_REGION"
          echo "BUCKET: $BUCKET"
          echo "PROJECT: $PROJECT"
          echo "SOURCE_ENV: $SOURCE_ENV"

          # ----- summary header ----------------------------------------------
          {
            echo "## Promotion Summary"
            echo "- Source environment: \`$SOURCE_ENV\`"
            echo "- Source region: \`$SOURCE_REGION\`"
            echo "- Target environment: \`prod\`"
            echo "- Target region: \`$DESTINATION_REGION\`"
            echo "- Workflow run: \`${{ github.run_id }}\`"
            echo
          } >> "$SUMMARY_FILE"

          # ----- promotion helper function -----------------------------------
          promote_component() {
            local component="$1"
            local manifest_input="$2"

            # ----- source manifest resolution --------------------------------
            local manifest_key="$manifest_input"
            if [ -z "$manifest_key" ]; then
              # Promotion defaults to the newest successful manifest because that manifest
              # already passed the lower-environment probe and represents the latest approved candidate.
              manifest_key=$(aws s3api list-objects-v2 \
                            --bucket "$BUCKET" \
                            --prefix "$PROJECT/deployments/$SOURCE_ENV/$component/successful/" \
                            --query 'reverse(sort_by(Contents || `[]`, &LastModified))[0].Key' \
                            --output text)
            fi

            if [ -z "$manifest_key" ] || [ "$manifest_key" = "None" ]; then
              echo "Error: no successful manifest found for $component in $SOURCE_ENV."
              exit 1
            fi

            aws s3 cp "s3://$BUCKET/$manifest_key" "promotion-manifests/${component}-source-manifest.json" >/dev/null

            # ----- image metadata extraction ---------------------------------
            local source_image_uri
            source_image_uri=$(jq -r '.imageUri // .image_uri' "promotion-manifests/${component}-source-manifest.json")
            local source_image_digest
            source_image_digest=$(jq -r '.imageDigest // .image_digest' "promotion-manifests/${component}-source-manifest.json")

            if [ -z "$source_image_uri" ] || [ "$source_image_uri" = "null" ]; then
              echo "Error: manifest $manifest_key does not contain imageUri."
              exit 1
            fi

            if [ -z "$source_image_digest" ] || [ "$source_image_digest" = "null" ]; then
              echo "Error: manifest $manifest_key does not contain imageDigest."
              exit 1
            fi

            # ----- target repository resolution ------------------------------
            # The manifest stores the exact image that passed lower-environment probing.
            # Promote by digest, not just by tag. The SHA tag is still useful for readability,
            # but the digest is the immutable identity of the exact artifact that passed lower-env
            # validation and should therefore be the primary promotion lookup key.
            local source_repository_with_tag="${source_image_uri#*/}"
            local source_repository="${source_repository_with_tag%:*}"
            local source_tag="${source_repository_with_tag##*:}"
            local destination_repository="${PROJECT}-${component}-repo-${{ vars.ENV_VAR }}"
            local destination_image_uri="${DESTINATION_REGISTRY}/${destination_repository}:${source_tag}"
            local source_registry
            source_registry="$(echo "$source_image_uri" | cut -d'/' -f1)"
            local source_repository_path
            source_repository_path="$(echo "$source_image_uri" | cut -d'/' -f2- | cut -d':' -f1)"
            local source_digest_uri="${source_registry}/${source_repository_path}@${source_image_digest}"

            # aws ecr put-image \
            #   --region "$DESTINATION_REGION" \
            #   --repository-name "$destination_repository" \
            #   --image-tag "$source_tag" \
            #   --image-manifest "$image_manifest" >/dev/null

            # # Also refresh latest so the existing deploy.yml fetch-latest behavior continues
            # # to resolve to the newly approved prod image without needing explicit image inputs.
            # aws ecr put-image \
            #   --region "$DESTINATION_REGION" \
            #   --repository-name "$destination_repository" \
            #   --image-tag latest \
            #   --image-manifest "$image_manifest" >/dev/null


            # ----- docker artifact promotion ---------------------------------
            # Login to SOURCE region ECR
            aws ecr get-login-password --region "$SOURCE_REGION" \
              | docker login --username AWS --password-stdin \
                "$source_registry"

            # Login to DESTINATION region ECR
            aws ecr get-login-password --region "$DESTINATION_REGION" \
              | docker login --username AWS --password-stdin "$DESTINATION_REGISTRY"

            # Pull the exact approved artifact by digest instead of trusting whatever the source
            # tag points to at promotion time. This keeps promotion immutable even if tags move.
            docker pull "$source_digest_uri"

            # Tag for destination
            docker tag "$source_digest_uri" "$destination_image_uri"

            # Push to destination
            docker push "$destination_image_uri"

            # ----- promoted digest verification -----------------------------
            local promoted_image_digest
            promoted_image_digest=$(aws ecr describe-images \
              --region "$DESTINATION_REGION" \
              --repository-name "$destination_repository" \
              --image-ids imageTag="$source_tag" \
              --query 'imageDetails[0].imageDigest' \
              --output text)

            if [ -z "$promoted_image_digest" ] || [ "$promoted_image_digest" = "None" ]; then
              echo "Error: could not resolve promoted image digest for $destination_image_uri."
              exit 1
            fi

            # Cleanup local image to save runner disk space
            docker rmi "$source_digest_uri" "$destination_image_uri" || true

            # ----- promotion manifest generation -----------------------------
          jq -n \
            --arg project            "$PROJECT" \
            --arg sourceEnvironment  "$SOURCE_ENV" \
            --arg sourceManifestKey  "$manifest_key" \
            --arg sourceImageUri     "$source_image_uri" \
            --arg sourceImageDigest  "$source_image_digest" \
            --arg promotedImageUri   "$destination_image_uri" \
            --arg promotedImageDigest "$promoted_image_digest" \
            --arg sourceRegion       "$SOURCE_REGION" \
            --arg targetRegion       "$DESTINATION_REGION" \
            --arg promotedBy         "arsalanshaikh13" \
            --arg promotedAt         "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              project: $project,
              sourceEnvironment: $sourceEnvironment,
              targetEnvironment: "prod",
              component: "'"$component"'",
              sourceManifestKey: $sourceManifestKey,
              sourceImageUri: $sourceImageUri,
              sourceImageDigest: $sourceImageDigest,
              promotedImageUri: $promotedImageUri,
              promotedImageDigest: $promotedImageDigest,
              sourceRegion: $sourceRegion,
              targetRegion: $targetRegion,
              promotedBy: $promotedBy,
              promotedAt: $promotedAt
            }' > "promotion-manifests/${component}-promotion.json"

            # ----- manifest archival -----------------------------------------
            aws s3 cp \
              "promotion-manifests/${component}-promotion.json" \
              "s3://$BUCKET/$PROJECT/promotions/prod/$component/run-${{ github.run_id }}.json" >/dev/null

            # ----- summary update --------------------------------------------
            {
              echo "### ${component} promoted to prod"
              echo "- Source manifest: \`$manifest_key\`"
              echo "- Source image: \`$source_image_uri\`"
              echo "- Source digest: \`$source_image_digest\`"
              echo "- Promoted image: \`$destination_image_uri\`"
              echo "- Promoted digest: \`$promoted_image_digest\`"
              echo
            } >> "$SUMMARY_FILE"
          }

          # ----- component promotion execution -------------------------------
          if [ "${{ inputs.promote_frontend }}" = "true" ]; then
            promote_component "frontend" "${{ inputs.frontend_manifest_s3_key }}"
          fi

          if [ "${{ inputs.promote_backend }}" = "true" ]; then
            promote_component "backend" "${{ inputs.backend_manifest_s3_key }}"
          fi

          # ----- step outputs -----------------------------------------------
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload promotion manifests
        uses: actions/upload-artifact@v4
        with:
          name: promotion-manifests-prod-${{ github.run_id }}
          path: promotion-manifests
          if-no-files-found: error

      - name: Trigger prod deployment workflow
        id: trigger-deploy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # ----- workflow dispatch execution ----------------------------------
          # Promotion stays focused on approving and moving the image artifact.
          # The existing deploy.yml remains the single place that knows how to deploy,
          # probe, and rollback the prod services.
          gh workflow run deploy.yml \
            --ref "${{ github.ref_name }}" \
            -f action_type=deploy \
            -f target_environment=prod \
            -f build_frontend=false \
            -f get_frontend=${{ inputs.promote_frontend }} \
            -f build_backend=false \
            -f get_backend=${{ inputs.promote_backend }} \
            -f run_seeding=${{ inputs.run_seeding_in_prod }} \
            -f default_launch_type=${{ inputs.default_launch_type }} \
            -f default_network_mode=${{ inputs.default_network_mode }} \
            -f release_version=${{ needs.predeploy-guardrails.outputs.resolved_release_version }} \
            -f change_ticket=${{ inputs.change_ticket }} \
            -f break_glass_reason=${{ inputs.break_glass_reason }} \
            -f enable_security_scan=${{ inputs.enable_security_scan }} \
            -f enable_sbom=${{ inputs.enable_sbom }} \
            -f vulnerability_threshold=${{ inputs.vulnerability_threshold }}

          # ----- step outputs -----------------------------------------------
          {
            echo "triggered_ref=${{ github.ref_name }}"
            echo "run_seeding=${{ inputs.run_seeding_in_prod }}"
            echo "default_launch_type=${{ inputs.default_launch_type }}"
            echo "default_network_mode=${{ inputs.default_network_mode }}"
            echo "release_version=${{ needs.predeploy-guardrails.outputs.resolved_release_version }}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish promotion summary to job summary
        shell: bash
        run: |
          # ----- job summary rendering ---------------------------------------
          cat "${{ steps.promote-images.outputs.summary_file }}" >> "$GITHUB_STEP_SUMMARY"

          {
            echo "## Triggered Prod Deploy"
            echo "- Workflow: \`deploy.yml\`"
            echo "- Ref: \`${{ steps.trigger-deploy.outputs.triggered_ref }}\`"
            echo "- get_frontend: \`${{ inputs.promote_frontend }}\`"
            echo "- get_backend: \`${{ inputs.promote_backend }}\`"
            echo "- run_seeding: \`${{ steps.trigger-deploy.outputs.run_seeding }}\`"
            echo "- default_launch_type: \`${{ steps.trigger-deploy.outputs.default_launch_type }}\`"
            echo "- default_network_mode: \`${{ steps.trigger-deploy.outputs.default_network_mode }}\`"
            echo "- release_version: \`${{ steps.trigger-deploy.outputs.release_version }}\`"
            echo
            echo "This promotion workflow copies the approved image into the prod-region ECR repository first."
            echo "The triggered deploy workflow then reuses its existing fetch-from-ECR path, which keeps deployment logic centralized in one place."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-promotion-completed:
    name: Notify Promotion Completed
    needs: [predeploy-guardrails, promote-and-dispatch]
    if: ${{ needs.promote-and-dispatch.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials for notification publishing
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.PROD_AWS_REGION || 'us-east-2' }}

      - name: Publish promotion completed notification
        uses: ./.github/actions/send-release-notification
        with:
          topic_arn: ${{ vars.PROD_RELEASE_NOTIFICATIONS_TOPIC_ARN || '' }}
          aws_region: ${{ vars.PROD_AWS_REGION || 'us-east-2' }}
          notification_event: promotion_completed
          project_name: ${{ vars.PROJECT_NAME }}
          environment: prod
          status: success
          release_version: ${{ needs.predeploy-guardrails.outputs.resolved_release_version }}
          change_ticket: ${{ inputs.change_ticket }}
          workflow_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          summary: "${{ format('Approved images from {0} were promoted into prod ECR and deploy.yml was dispatched for prod rollout.', inputs.source_environment) }}"
