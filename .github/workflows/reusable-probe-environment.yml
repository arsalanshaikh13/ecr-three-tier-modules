name: Reusable Probe Environment

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name used for vars, approvals, and deployment targeting."
        required: true
        type: string
      project_name:
        description: "Project name prefix used in ECS/ECR/SSM/S3 naming."
        required: true
        type: string
      build_image:
        description: "Whether the caller allows this probe run to build a fresh probe image if fetch cannot reuse one."
        required: true
        type: boolean
      fetch_image:
        description: "Whether the caller wants this probe run to try reusing the existing probe image from ECR first."
        required: true
        type: boolean
      probe_network_mode:
        description: "Optional probe execution network mode override. Supported values are non-awsvpc and awsvpc."
        required: false
        type: string
        default: "awsvpc"
      probe_launch_type:
        description: "Optional probe launch type override. Supported values are EC2 and FARGATE."
        required: false
        type: string
        default: "FARGATE"
      probe_security_group_name:
        description: "Optional awsvpc security group name override for probe execution."
        required: false
        type: string
        default: ""
      probe_subnet_tag_values:
        description: "Optional awsvpc subnet Name tag values override for probe execution."
        required: false
        type: string
        default: ""
      probe_assign_public_ip:
        description: "Optional awsvpc assignPublicIp override for probe execution."
        required: false
        type: string
        default: ""
      update_pointers_on_success:
        description: "Whether a successful probe should advance deployment pointers in SSM."
        required: false
        type: boolean
        default: true
      probe_purpose:
        description: "High-level purpose of the probe. Supported values are deployment and rollback_verification."
        required: false
        type: string
        default: deployment
    outputs:
      environment:
        description: "Environment that was probed."
        value: ${{ jobs.probe-environment.outputs.environment }}
      probe_status:
        description: "Final probe status, successful or failed."
        value: ${{ jobs.probe-environment.outputs.probe_status }}
      probe_reason:
        description: "Probe result reason derived from ECS task exit and stop data."
        value: ${{ jobs.probe-environment.outputs.probe_reason }}
      probe_log_file:
        description: "Local log artifact filename generated for the probe task."
        value: ${{ jobs.probe-environment.outputs.probe_log_file }}
      manifest_artifact_name:
        description: "Artifact name produced for probe-generated deployment manifests."
        value: ${{ jobs.probe-environment.outputs.manifest_artifact_name }}

permissions:
  id-token: write
  contents: read

jobs:
  probe-environment:
    name: Probe App (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ inputs.environment }}
      probe_status: ${{ steps.probe-contract.outputs.probe_status }}
      probe_reason: ${{ steps.probe-contract.outputs.probe_reason }}
      probe_log_file: ${{ steps.probe-result.outputs.log_file }}
      manifest_artifact_name: ${{ steps.probe-contract.outputs.manifest_artifact_name }}
    # Probe is environment-scoped because it validates the deployed surface of one environment
    # and writes the corresponding success/failure manifests and deployment pointers.
    environment: ${{ inputs.environment }}
    env:
      ECS_CLUSTER: ${{ inputs.project_name }}-cluster-${{ vars.ENV_VAR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare probe task definition up to registration
        id: prepare-probe-task-def
        uses: ./.github/actions/ecs-prepare-task-definition
        with:
          workdir: lirw-three-tier/probe
          ecr_repository: ${{ inputs.project_name }}-probe-repo-${{ vars.ENV_VAR }}
          image_tag: ${{ github.sha }}
          additional_tag: latest
          # Image policy is caller-owned on purpose. That keeps deploy.yml as the single place
          # where we decide whether a given probe invocation should fetch-first, fetch-only,
          # or force a rebuild, while this reusable workflow stays focused on execution.
          build_image: ${{ inputs.build_image }}
          fetch_image: ${{ inputs.fetch_image }}
          task_definition_name: ${{ inputs.project_name }}-probe-${{ vars.ENV_VAR }}
          task_definition_output_path: task-definition-probe-${{ vars.ENV_VAR }}.json
          # Probe uses its own standalone task family and container name, but the shared action
          # still handles the repetitive image/download/render/register sequence for us.
          container_name: ${{ inputs.project_name }}-probe-${{ vars.ENV_VAR }}

      - name: Derive probe reporting contract
        id: probe-config
        shell: bash
        run: |
          # ----- probe purpose dispatch -------------------------------------
          # Keep one probe workflow reusable for both normal deployment validation and
          # post-rollback recovery verification. The purpose only changes reporting and
          # manifest paths; the underlying health check stays the same.
          if [ "${{ inputs.probe_purpose }}" = "rollback_verification" ]; then
            echo "success_artifact_name=successful-rollback-verification-manifests-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "failure_artifact_name=failed-rollback-verification-manifests-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "bucket_prefix_root=${{ inputs.project_name }}/rollback-verifications/${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "summary_heading=Rollback Recovery Verification" >> "$GITHUB_OUTPUT"
            echo "summary_slug=rollback-verification" >> "$GITHUB_OUTPUT"
          else
            echo "success_artifact_name=successful-deployment-manifests-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "failure_artifact_name=failed-deployment-manifests-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "bucket_prefix_root=${{ inputs.project_name }}/deployments/${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "summary_heading=Deployment Validation" >> "$GITHUB_OUTPUT"
            echo "summary_slug=deployment" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve probe execution mode
        id: probe-execution
        shell: bash
        run: |
          # ----- input normalization ----------------------------------------
          # Probe execution settings are resolved inside the reusable workflow's
          # environment-bound job so dev/prod can diverge safely without the caller
          # accidentally resolving the wrong environment-scoped values too early.
          NETWORK_MODE="${{ inputs.probe_network_mode }}"
          LAUNCH_TYPE="${{ inputs.probe_launch_type }}"
          SECURITY_GROUP_NAME="${{ inputs.probe_security_group_name }}"
          SUBNET_TAG_VALUES="${{ inputs.probe_subnet_tag_values }}"
          ASSIGN_PUBLIC_IP="${{ inputs.probe_assign_public_ip }}"

          # ----- network mode and launch type fallback ----------------------
          if [ -z "$NETWORK_MODE" ]; then
            NETWORK_MODE="${{ vars.PROBE_NETWORK_MODE || 'awsvpc' }}"
          fi

          if [ -z "$LAUNCH_TYPE" ]; then
            if [ "$NETWORK_MODE" = "awsvpc" ]; then
              LAUNCH_TYPE="${{ vars.PROBE_LAUNCH_TYPE || 'FARGATE' }}"
            else
              LAUNCH_TYPE="${{ vars.PROBE_LAUNCH_TYPE || 'EC2' }}"
            fi
          fi

          # ----- environment-specific network defaults ----------------------
          if [ -z "$SECURITY_GROUP_NAME" ]; then
            SECURITY_GROUP_NAME="${{ vars.PROBE_SECURITY_GROUP_NAME || format('ecs-node-frontend-sg-{0}', vars.ENV_VAR) }}"
          fi

          if [ -z "$SUBNET_TAG_VALUES" ]; then
            SUBNET_TAG_VALUES="${{ vars.PROBE_SUBNET_TAG_VALUES || 'pri-sub-3a,pri-sub-4b' }}"
          fi

          if [ -z "$ASSIGN_PUBLIC_IP" ]; then
            ASSIGN_PUBLIC_IP="${{ vars.PROBE_ASSIGN_PUBLIC_IP || 'ENABLED' }}"
          fi

          # ----- action outputs ----------------------------------------------
          echo "network_mode=$NETWORK_MODE" >> "$GITHUB_OUTPUT"
          echo "launch_type=$LAUNCH_TYPE" >> "$GITHUB_OUTPUT"
          echo "security_group_name=$SECURITY_GROUP_NAME" >> "$GITHUB_OUTPUT"
          echo "subnet_tag_values=$SUBNET_TAG_VALUES" >> "$GITHUB_OUTPUT"
          echo "assign_public_ip=$ASSIGN_PUBLIC_IP" >> "$GITHUB_OUTPUT"

      - name: Run probe task (non-awsvpc)
        id: run-probe
        if: ${{ steps.probe-execution.outputs.network_mode != 'awsvpc' }}
        uses: ./.github/actions/ecs-run-task
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          aws_region: ${{ vars.AWS_REGION }}
          task_definition: ${{ steps.prepare-probe-task-def.outputs.task_definition_arn }}
          # Probe can now execute on EC2 non-awsvpc just like seeding when the target
          # environment wants bridge/host networking instead of Fargate-style awsvpc.
          launch_type: ${{ steps.probe-execution.outputs.launch_type }}

      - name: Run probe task (awsvpc)
        id: run-probe-awsvpc
        if: ${{ steps.probe-execution.outputs.network_mode == 'awsvpc' }}
        uses: ./.github/actions/ecs-run-task-awsvpc
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          aws_region: ${{ vars.AWS_REGION }}
          task_definition: ${{ steps.prepare-probe-task-def.outputs.task_definition_arn }}
          launch_type: ${{ steps.probe-execution.outputs.launch_type }}
          # The reusable probe workflow keeps awsvpc-specific network lookup inside the awsvpc
          # action so the workflow itself only needs to describe the desired probe-facing network.
          security_group_name: ${{ steps.probe-execution.outputs.security_group_name }}
          subnet_tag_values: ${{ steps.probe-execution.outputs.subnet_tag_values }}
          assign_public_ip: ${{ steps.probe-execution.outputs.assign_public_ip }}

      - name: Wait for probe task result
        id: probe-result
        uses: ./.github/actions/ecs-wait-task-result
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          task_arn: ${{ steps.run-probe.outputs.task_arn || steps.run-probe-awsvpc.outputs.task_arn }}
          task_definition: ${{ steps.prepare-probe-task-def.outputs.task_definition_arn }}
          log_file: probe-logs-${{ inputs.environment }}.txt
          fetch_logs: true
          fail_on_nonzero_exit: true

      - name: Download deployment metadata artifacts
        if: ${{ always() }}
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-metadata-*-${{ inputs.environment }}
          path: deploy-metadata
          merge-multiple: true

      - name: Prepare success manifest workspace
        if: ${{ success() }}
        id: success-manifests
        shell: bash
        run: |
          set -euo pipefail

          # ----- success manifest workspace ---------------------------------
          mkdir -p manifests/success
          SUMMARY_FILE="manifests/success/${{ steps.probe-config.outputs.summary_slug }}-summary-${{ inputs.environment }}.md"
          touch "$SUMMARY_FILE"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Update deployment pointers after probe success
        if: ${{ success() && inputs.update_pointers_on_success }}
        uses: ./.github/actions/deployment-pointer-write-batch
        with:
          metadata_glob: deploy-metadata/deploy-metadata-*-${{ inputs.environment }}.json
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}

      - name: Persist successful deployment state and manifests
        if: ${{ success() }}
        uses: ./.github/actions/deployment-manifest-write-batch
        with:
          metadata_glob: deploy-metadata/deploy-metadata-*-${{ inputs.environment }}.json
          manifest_dir: manifests/success
          bucket: ${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}
          bucket_prefix_root: ${{ steps.probe-config.outputs.bucket_prefix_root }}
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          status: successful
          reason: ${{ steps.probe-result.outputs.result_reason }}
          workflow_name: ${{ github.workflow }}
          actor: ${{ github.actor }}
          summary_file: ${{ steps.success-manifests.outputs.summary_file }}

      - name: Upload successful deployment manifests
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.probe-config.outputs.success_artifact_name }}
          path: manifests/success
          if-no-files-found: error

      - name: Publish deployment summary to job summary
        if: ${{ success() }}
        shell: bash
        run: |
          # ----- summary file replay ----------------------------------------
          # Job summaries are a lighter-weight place to iterate on deployment reporting:
          # they stay attached to the workflow run without adding PR noise while the
          # rollout, probe, and rollback flow is still being refined.
          cat "${{ steps.success-manifests.outputs.summary_file }}" >> "$GITHUB_STEP_SUMMARY"

          # ----- contextual deployment summary ------------------------------
          {
            echo "## ${{ steps.probe-config.outputs.summary_heading }} Context"
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo "- Commit SHA: \`${{ github.sha }}\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Probe reason: ${{ steps.probe-result.outputs.result_reason }}"
            echo "- Manifest artifact: \`${{ steps.probe-config.outputs.success_artifact_name }}\`"
            echo "- Manifest bucket: \`${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}\`"
            echo "- Advances deployment pointers: \`${{ inputs.update_pointers_on_success }}\`"
            echo
            echo "### Probe Log Artifact"
            echo "- Probe log file: \`${{ steps.probe-result.outputs.log_file }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persist failed deployment manifests
        if: ${{ failure() }}
        uses: ./.github/actions/deployment-manifest-write-batch
        with:
          metadata_glob: deploy-metadata/deploy-metadata-*-${{ inputs.environment }}.json
          manifest_dir: manifests/failure
          bucket: ${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}
          bucket_prefix_root: ${{ steps.probe-config.outputs.bucket_prefix_root }}
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          status: failed
          reason: ${{ steps.probe-result.outputs.result_reason }}
          workflow_name: ${{ github.workflow }}
          actor: ${{ github.actor }}

      - name: Upload failed deployment manifests
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.probe-config.outputs.failure_artifact_name }}
          path: manifests/failure
          if-no-files-found: error

      - name: Capture probe workflow output contract
        if: ${{ always() }}
        id: probe-contract
        shell: bash
        run: |
          # ----- probe status contract --------------------------------------
          if [ "${{ job.status }}" = "success" ]; then
            echo "probe_status=successful" >> "$GITHUB_OUTPUT"
            echo "manifest_artifact_name=${{ steps.probe-config.outputs.success_artifact_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "probe_status=failed" >> "$GITHUB_OUTPUT"
            echo "manifest_artifact_name=${{ steps.probe-config.outputs.failure_artifact_name }}" >> "$GITHUB_OUTPUT"
          fi

          # ----- probe reason output ----------------------------------------
          echo "probe_reason=${{ steps.probe-result.outputs.result_reason }}" >> "$GITHUB_OUTPUT"
