name: Reusable Auto Rollback

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name used for vars, approvals, and deployment targeting."
        required: true
        type: string
      component:
        description: "Application component being rolled back, for example frontend or backend."
        required: true
        type: string
      project_name:
        description: "Project name prefix used in ECS/SSM/S3 naming."
        required: true
        type: string
      service_launch_type:
        description: "Optional service launch type override for rollback. Supported values are EC2 and FARGATE."
        required: false
        type: string
        default: ""
      service_network_mode:
        description: "Optional service network mode override for rollback. Supported values are non-awsvpc and awsvpc."
        required: false
        type: string
        default: ""
      security_group_name:
        description: "Optional awsvpc security group name override for rollback."
        required: false
        type: string
        default: ""
      subnet_tag_values:
        description: "Optional awsvpc subnet Name tag values override for rollback."
        required: false
        type: string
        default: ""
      assign_public_ip:
        description: "Optional awsvpc assignPublicIp override for rollback."
        required: false
        type: string
        default: ""
    outputs:
      environment:
        description: "Environment that was rolled back."
        value: ${{ jobs.rollback-service.outputs.environment }}
      component:
        description: "Component that was rolled back."
        value: ${{ jobs.rollback-service.outputs.component }}
      rollback_target_task_definition_arn:
        description: "Task definition ARN restored during automatic rollback."
        value: ${{ jobs.rollback-service.outputs.rollback_target_task_definition_arn }}
      rollback_reason:
        description: "Human-readable rollback reason recorded in the manifest."
        value: ${{ jobs.rollback-service.outputs.rollback_reason }}
      manifest_artifact_name:
        description: "Artifact name containing automatic rollback manifests."
        value: ${{ jobs.rollback-service.outputs.manifest_artifact_name }}

permissions:
  id-token: write
  contents: read

jobs:
  rollback-service:
    name: Roll Back ${{ inputs.component }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ inputs.environment }}
      component: ${{ inputs.component }}
      rollback_target_task_definition_arn: ${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}
      rollback_reason: ${{ steps.rollback-target.outputs.rollback_target_reason }}
      manifest_artifact_name: rollback-manifests-${{ inputs.component }}-${{ inputs.environment }}
    # Keep rollback attached to the target environment so approvals, environment-scoped vars,
    # and logs all stay grouped under the same deployment surface as the original rollout.
    environment: ${{ inputs.environment }}
    env:
      ECS_CLUSTER: ${{ inputs.project_name }}-cluster-${{ vars.ENV_VAR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download deployment metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}
          path: deploy-metadata

      - name: Read rollback metadata
        id: rollback-metadata
        shell: bash
        run: |
          # ----- deployment metadata file -----------------------------------
          METADATA_FILE="deploy-metadata/deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}.json"

          # ----- metadata outputs -------------------------------------------
          # Deployment metadata remains the shared contract between deploy, probe, and rollback:
          # it tells rollback which service was targeted and which revision failed.
          echo "cluster=$(jq -r '.cluster' "$METADATA_FILE")" >> "$GITHUB_OUTPUT"
          echo "service=$(jq -r '.service' "$METADATA_FILE")" >> "$GITHUB_OUTPUT"
          echo "attempted_task_definition_arn=$(jq -r '.newTaskDefinitionArn // .new_task_definition_arn' "$METADATA_FILE")" >> "$GITHUB_OUTPUT"

      - name: Resolve rollback target from trusted pointer and manifest history
        id: rollback-target
        uses: ./.github/actions/deployment-history-resolve-rollback
        with:
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          component: ${{ inputs.component }}
          bucket: ${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}
          attempted_task_definition_arn: ${{ steps.rollback-metadata.outputs.attempted_task_definition_arn }}

      - name: Validate rollback target exists
        shell: bash
        run: |
          # ----- rollback target validation ---------------------------------
          if [ -z "${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}" ]; then
            echo "Error: No rollback target task definition ARN could be resolved for ${{ inputs.component }} (${{ inputs.environment }})."
            exit 1
          fi

      - name: Resolve rollback execution mode
        id: rollback-execution
        shell: bash
        run: |
          # ----- input normalization ----------------------------------------
          # Rollback should follow the same runtime shape as the service that was deployed.
          # Resolve the mode here inside the environment-bound job so dev/prod can differ safely.
          LAUNCH_TYPE="${{ inputs.service_launch_type }}"
          NETWORK_MODE="${{ inputs.service_network_mode }}"
          SECURITY_GROUP_NAME="${{ inputs.security_group_name }}"
          SUBNET_TAG_VALUES="${{ inputs.subnet_tag_values }}"
          ASSIGN_PUBLIC_IP="${{ inputs.assign_public_ip }}"

          # ----- launch type and network mode fallback -----------------------
          if [ -z "$LAUNCH_TYPE" ]; then
            LAUNCH_TYPE="${{ vars.SERVICE_LAUNCH_TYPE || 'EC2' }}"
          fi

          if [ -z "$NETWORK_MODE" ]; then
            if [ "$LAUNCH_TYPE" = "FARGATE" ]; then
              NETWORK_MODE="awsvpc"
            else
              NETWORK_MODE="${{ vars.SERVICE_NETWORK_MODE || 'non-awsvpc' }}"
            fi
          fi

          # ----- component-aware network defaults ----------------------------
          if [ -z "$SECURITY_GROUP_NAME" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              SECURITY_GROUP_NAME="${{ vars.FRONTEND_SERVICE_SECURITY_GROUP_NAME || vars.SERVICE_SECURITY_GROUP_NAME || '' }}"
            else
              SECURITY_GROUP_NAME="${{ vars.BACKEND_SERVICE_SECURITY_GROUP_NAME || vars.SERVICE_SECURITY_GROUP_NAME || '' }}"
            fi
          fi

          if [ -z "$SUBNET_TAG_VALUES" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              SUBNET_TAG_VALUES="${{ vars.FRONTEND_SERVICE_SUBNET_TAG_VALUES || vars.SERVICE_SUBNET_TAG_VALUES || '' }}"
            else
              SUBNET_TAG_VALUES="${{ vars.BACKEND_SERVICE_SUBNET_TAG_VALUES || vars.SERVICE_SUBNET_TAG_VALUES || '' }}"
            fi
          fi

          if [ -z "$ASSIGN_PUBLIC_IP" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              ASSIGN_PUBLIC_IP="${{ vars.FRONTEND_SERVICE_ASSIGN_PUBLIC_IP || vars.SERVICE_ASSIGN_PUBLIC_IP || 'DISABLED' }}"
            else
              ASSIGN_PUBLIC_IP="${{ vars.BACKEND_SERVICE_ASSIGN_PUBLIC_IP || vars.SERVICE_ASSIGN_PUBLIC_IP || 'DISABLED' }}"
            fi
          fi

          # ----- action outputs ----------------------------------------------
          echo "launch_type=$LAUNCH_TYPE" >> "$GITHUB_OUTPUT"
          echo "network_mode=$NETWORK_MODE" >> "$GITHUB_OUTPUT"
          echo "security_group_name=$SECURITY_GROUP_NAME" >> "$GITHUB_OUTPUT"
          echo "subnet_tag_values=$SUBNET_TAG_VALUES" >> "$GITHUB_OUTPUT"
          echo "assign_public_ip=$ASSIGN_PUBLIC_IP" >> "$GITHUB_OUTPUT"

      - name: Roll back ECS service
        uses: ./.github/actions/ecs-rollback-service
        with:
          cluster: ${{ steps.rollback-metadata.outputs.cluster }}
          aws_region: ${{ vars.AWS_REGION }}
          service: ${{ steps.rollback-metadata.outputs.service }}
          task_definition: ${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}
          service_launch_type: ${{ steps.rollback-execution.outputs.launch_type }}
          service_network_mode: ${{ steps.rollback-execution.outputs.network_mode }}
          security_group_name: ${{ steps.rollback-execution.outputs.security_group_name }}
          subnet_tag_values: ${{ steps.rollback-execution.outputs.subnet_tag_values }}
          assign_public_ip: ${{ steps.rollback-execution.outputs.assign_public_ip }}

      # - name: Wait for rollback stability
      #   uses: ./.github/actions/ecs-wait-service-stable
      #   with:
      #     cluster: ${{ steps.rollback-metadata.outputs.cluster }}
      #     service: ${{ steps.rollback-metadata.outputs.service }}

      - name: Reset deployment pointers after rollback
        uses: ./.github/actions/deployment-pointer-write
        with:
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          component: ${{ inputs.component }}
          current_task_definition_arn: ${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}
          last_known_good_task_definition_arn: ${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}

      - name: Capture rollback timestamp
        id: rollback-timestamp
        shell: bash
        run: |
          # ----- timestamp capture ------------------------------------------
          echo "value=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Persist rollback state and manifest
        uses: ./.github/actions/deployment-manifest-write
        with:
          manifest_dir: manifests/rollback
          bucket: ${{ vars.DEPLOYMENT_MANIFEST_BUCKET }}
          bucket_prefix: ${{ inputs.project_name }}/deployments/${{ inputs.environment }}/${{ inputs.component }}/rollback
          project: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          component: ${{ inputs.component }}
          cluster: ${{ steps.rollback-metadata.outputs.cluster }}
          service: ${{ steps.rollback-metadata.outputs.service }}
          task_definition_arn: ${{ steps.rollback-target.outputs.rollback_target_task_definition_arn }}
          previous_task_definition_arn: ${{ steps.rollback-metadata.outputs.attempted_task_definition_arn }}
          workflow_run_id: ${{ github.run_id }}
          workflow_name: ${{ github.workflow }}
          actor: ${{ github.actor }}
          timestamp: ${{ steps.rollback-timestamp.outputs.value }}
          status: rolled_back
          reason: ${{ steps.rollback-target.outputs.rollback_target_reason }}

      - name: Upload rollback manifests
        uses: actions/upload-artifact@v4
        with:
          name: rollback-manifests-${{ inputs.component }}-${{ inputs.environment }}
          path: manifests/rollback
          if-no-files-found: error
