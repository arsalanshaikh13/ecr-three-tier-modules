name: Reusable Deploy Service

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name used for vars, approvals, and deployment targeting."
        required: true
        type: string
      component:
        description: "Application component being deployed, for example frontend or backend."
        required: true
        type: string
      project_name:
        description: "Project name prefix used in ECS/ECR naming."
        required: true
        type: string
      release_version:
        description: "Immutable release version resolved by predeploy guardrails."
        required: true
        type: string
      build_image:
        description: "Whether this deploy should build and push a fresh image."
        required: true
        type: boolean
      fetch_image:
        description: "Whether this deploy should reuse the most recently pushed image from ECR."
        required: true
        type: boolean
      service_network_mode:
        description: "Service network mode for deployment execution. Supported values are non-awsvpc and awsvpc."
        required: false
        type: string
        default: non-awsvpc
      security_group_name:
        description: "Optional awsvpc security group name to resolve when service_network_mode is awsvpc."
        required: false
        type: string
      subnet_tag_values:
        description: "Optional awsvpc subnet Name tag values when service_network_mode is awsvpc."
        required: false
        type: string
      assign_public_ip:
        description: "Whether awsvpc service updates should assign a public IP."
        required: false
        type: string
        default: DISABLED
      enable_security_scan:
        description: "Whether the pluggable image security gate should run after image resolution."
        required: false
        type: boolean
        default: false
      enable_sbom:
        description: "Whether the pluggable SBOM generator should run after image resolution."
        required: false
        type: boolean
        default: false
      vulnerability_threshold:
        description: "Severity threshold forwarded into the image security gate."
        required: false
        type: string
        default: CRITICAL
    outputs:
      environment:
        description: "Environment that received the deployment."
        value: ${{ jobs.deploy-service.outputs.environment }}
      component:
        description: "Component that was deployed."
        value: ${{ jobs.deploy-service.outputs.component }}
      cluster:
        description: "ECS cluster targeted by the deployment."
        value: ${{ jobs.deploy-service.outputs.cluster }}
      service:
        description: "ECS service updated by the deployment."
        value: ${{ jobs.deploy-service.outputs.service }}
      task_definition_arn:
        description: "Newly registered task definition ARN used for the deployment."
        value: ${{ jobs.deploy-service.outputs.task_definition_arn }}
      previous_task_definition_arn:
        description: "Task definition ARN that the service used before this deployment."
        value: ${{ jobs.deploy-service.outputs.previous_task_definition_arn }}
      image_uri:
        description: "Image URI baked into the deployed task definition."
        value: ${{ jobs.deploy-service.outputs.image_uri }}
      image_digest:
        description: "Resolved image digest baked into deployment metadata."
        value: ${{ jobs.deploy-service.outputs.image_digest }}
      metadata_artifact_name:
        description: "Artifact name containing deployment metadata for downstream workflows."
        value: ${{ jobs.deploy-service.outputs.metadata_artifact_name }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy-service:
    name: Deploy ${{ inputs.component }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      # Expose a stable workflow-level contract so callers can compose deploy/probe/rollback
      # without needing to know which internal step produced a given deployment identifier.
      environment: ${{ inputs.environment }}
      component: ${{ inputs.component }}
      cluster: ${{ env.ECS_CLUSTER }}
      service: ${{ inputs.component }}-service
      task_definition_arn: ${{ steps.prepare-task-def.outputs.task_definition_arn }}
      previous_task_definition_arn: ${{ steps.prepare-task-def.outputs.current_task_definition_arn }}
      image_uri: ${{ steps.prepare-task-def.outputs.image }}
      image_digest: ${{ steps.image-metadata.outputs.image_digest }}
      metadata_artifact_name: deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}
    # Keep the environment on the reusable workflow job so approvals and environment-scoped
    # vars stay attached to the deployment unit instead of the caller needing to duplicate them.
    environment: ${{ inputs.environment }}
    env:
      # Resolve environment-specific values inside the bound job so prod/dev do not inherit
      # repo-level defaults from the caller.
      ECS_CLUSTER: ${{ inputs.project_name }}-cluster-${{ vars.ENV_VAR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare task definition up to registration
        id: prepare-task-def
        uses: ./.github/actions/ecs-prepare-task-definition
        with:
          workdir: lirw-three-tier/${{ inputs.component }}
          ecr_repository: ${{ inputs.project_name }}-${{ inputs.component }}-repo-${{ vars.ENV_VAR }}
          image_tag: ${{ github.sha }}
          additional_tag: latest
          build_image: ${{ inputs.build_image }}
          fetch_image: ${{ inputs.fetch_image }}
          task_definition_name: ${{ inputs.project_name }}-${{ inputs.component }}
          task_definition_output_path: task-definition-${{ inputs.component }}.json
          container_name: ${{ inputs.project_name }}_${{ inputs.component }}

      - name: Resolve image digest and tag metadata
        id: image-metadata
        uses: ./.github/actions/ecr-resolve-image-metadata
        with:
          ecr_repository: ${{ inputs.project_name }}-${{ inputs.component }}-repo-${{ vars.ENV_VAR }}
          image_uri: ${{ steps.prepare-task-def.outputs.image }}

      - name: Generate pluggable SBOM
        id: sbom
        uses: ./.github/actions/generate-sbom
        with:
          # SBOM generation is intentionally its own component so teams can enable or replace
          # it without rewriting deploy internals. This keeps supply-chain enrichment modular
          # instead of hardcoding a specific SBOM tool into the workflow itself.
          enabled: ${{ inputs.enable_sbom }}
          image_uri: ${{ steps.prepare-task-def.outputs.image }}
          output_file: deploy-sbom-${{ inputs.component }}-${{ inputs.environment }}.spdx.json

      - name: Upload SBOM artifact
        if: ${{ always() && steps.sbom.outputs.sbom_file != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-sbom-${{ inputs.component }}-${{ inputs.environment }}
          path: ${{ steps.sbom.outputs.sbom_file }}
          if-no-files-found: error

      - name: Run pluggable image security gate
        id: security-gate
        uses: ./.github/actions/image-security-gate
        with:
          # Keep scan behavior behind a dedicated action so teams can disable, replace, or
          # strengthen the scanner later without rewriting deploy orchestration itself.
          enabled: ${{ inputs.enable_security_scan }}
          image_uri: ${{ steps.prepare-task-def.outputs.image }}
          severity_threshold: ${{ inputs.vulnerability_threshold }}
          report_file: deploy-security-scan-${{ inputs.component }}-${{ inputs.environment }}.txt

      - name: Upload image security report
        if: ${{ always() && steps.security-gate.outputs.report_file != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-security-scan-${{ inputs.component }}-${{ inputs.environment }}
          path: ${{ steps.security-gate.outputs.report_file }}
          if-no-files-found: error

      - name: Persist deployment metadata for later jobs
        shell: bash
        run: |
          # ----- deployment metadata rendering -------------------------------
          # Persist deploy metadata once during deployment so probe and rollback jobs can consume
          # the same identifiers instead of rediscovering mutable ECS state later on.
          cat > deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}.json <<EOF
          {
            "component": "${{ inputs.component }}",
            "environment": "${{ inputs.environment }}",
            "cluster": "${{ env.ECS_CLUSTER }}",
            "service": "${{ inputs.component }}-service",
            "previousTaskDefinitionArn": "${{ steps.prepare-task-def.outputs.current_task_definition_arn }}",
            "newTaskDefinitionArn": "${{ steps.prepare-task-def.outputs.task_definition_arn }}",
            "imageUri": "${{ steps.prepare-task-def.outputs.image }}",
            "imageDigest": "${{ steps.image-metadata.outputs.image_digest }}",
            "imageTag": "${{ steps.image-metadata.outputs.image_tag }}",
            "releaseVersion": "${{ inputs.release_version }}",
            "sbomStatus": "${{ steps.sbom.outputs.sbom_status }}",
            "sbomArtifactName": "deploy-sbom-${{ inputs.component }}-${{ inputs.environment }}",
            "scanStatus": "${{ steps.security-gate.outputs.scan_status }}",
            "commitSha": "${{ github.sha }}",
            "workflowRunId": "${{ github.run_id }}"
          }
          EOF

      - name: Upload deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}
          path: deploy-metadata-${{ inputs.component }}-${{ inputs.environment }}.json
          if-no-files-found: error

      - name: Resolve service execution network defaults
        id: service-execution
        shell: bash
        run: |
          # ----- input normalization ----------------------------------------
          # Keep the reusable workflow generic, but let it understand component-tier fallbacks.
          # This avoids hardcoding subnet IDs while still allowing frontend and backend to move
          # onto different private subnet groups without breaking older callers immediately.
          NETWORK_MODE="${{ inputs.service_network_mode }}"
          SECURITY_GROUP_NAME="${{ inputs.security_group_name }}"
          SUBNET_TAG_VALUES="${{ inputs.subnet_tag_values }}"
          ASSIGN_PUBLIC_IP="${{ inputs.assign_public_ip }}"

          # ----- network mode fallback --------------------------------------
          if [ -z "$NETWORK_MODE" ]; then
            NETWORK_MODE="${{ vars.SERVICE_NETWORK_MODE || 'non-awsvpc' }}"
          fi

          # ----- component-aware network defaults ----------------------------
          if [ -z "$SECURITY_GROUP_NAME" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              SECURITY_GROUP_NAME="${{ vars.FRONTEND_SERVICE_SECURITY_GROUP_NAME || vars.SERVICE_SECURITY_GROUP_NAME || format('ecs-node-frontend-sg-{0}', vars.ENV_VAR) }}"
            else
              SECURITY_GROUP_NAME="${{ vars.BACKEND_SERVICE_SECURITY_GROUP_NAME || vars.SERVICE_SECURITY_GROUP_NAME || format('ecs-node-backend-sg-{0}', vars.ENV_VAR) }}"
            fi
          fi

          if [ -z "$SUBNET_TAG_VALUES" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              SUBNET_TAG_VALUES="${{ vars.FRONTEND_SERVICE_SUBNET_TAG_VALUES || vars.SERVICE_SUBNET_TAG_VALUES || 'pri-sub-3a,pri-sub-4b' }}"
            else
              SUBNET_TAG_VALUES="${{ vars.BACKEND_SERVICE_SUBNET_TAG_VALUES || vars.SERVICE_SUBNET_TAG_VALUES || 'pri-sub-3a,pri-sub-4b' }}"
            fi
          fi

          if [ -z "$ASSIGN_PUBLIC_IP" ]; then
            if [ "${{ inputs.component }}" = "frontend" ]; then
              ASSIGN_PUBLIC_IP="${{ vars.FRONTEND_SERVICE_ASSIGN_PUBLIC_IP || vars.SERVICE_ASSIGN_PUBLIC_IP || 'DISABLED' }}"
            else
              ASSIGN_PUBLIC_IP="${{ vars.BACKEND_SERVICE_ASSIGN_PUBLIC_IP || vars.SERVICE_ASSIGN_PUBLIC_IP || 'DISABLED' }}"
            fi
          fi

          # ----- action outputs ----------------------------------------------
          echo "network_mode=$NETWORK_MODE" >> "$GITHUB_OUTPUT"
          echo "security_group_name=$SECURITY_GROUP_NAME" >> "$GITHUB_OUTPUT"
          echo "subnet_tag_values=$SUBNET_TAG_VALUES" >> "$GITHUB_OUTPUT"
          echo "assign_public_ip=$ASSIGN_PUBLIC_IP" >> "$GITHUB_OUTPUT"

      - name: Update ECS service to new task definition (non-awsvpc)
        if: ${{ steps.service-execution.outputs.network_mode != 'awsvpc' }}
        uses: ./.github/actions/ecs-run-task
        with:
          run_mode: service
          cluster: ${{ env.ECS_CLUSTER }}
          aws_region: ${{ vars.AWS_REGION }}
          service: ${{ inputs.component }}-service
          task_definition: ${{ steps.prepare-task-def.outputs.task_definition_arn }}
          # Non-awsvpc services reuse the same execution boundary as task mode: the caller only
          # chooses service vs one-off task, while the action owns the ECS API call.
          force_new_deployment: true

      - name: Update ECS service to new task definition (awsvpc)
        if: ${{ steps.service-execution.outputs.network_mode == 'awsvpc' }}
        uses: ./.github/actions/ecs-run-task-awsvpc
        with:
          run_mode: service
          cluster: ${{ env.ECS_CLUSTER }}
          aws_region: ${{ vars.AWS_REGION }}
          service: ${{ inputs.component }}-service
          task_definition: ${{ steps.prepare-task-def.outputs.task_definition_arn }}
          # The reusable workflow stays generic here: the caller decides whether a target
          # environment uses awsvpc and passes the environment-specific lookup values in.
          # The awsvpc runner action then resolves the actual IDs and updates the service.
          # When those inputs are empty, use temporary environment-aligned defaults for testing.
          security_group_name: ${{ steps.service-execution.outputs.security_group_name }}
          subnet_tag_values: ${{ steps.service-execution.outputs.subnet_tag_values }}
          assign_public_ip: ${{ steps.service-execution.outputs.assign_public_ip }}
          force_new_deployment: true
