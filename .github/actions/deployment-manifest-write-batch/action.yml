name: Deployment Manifest Write Batch
description: Generate deployment manifests from a batch of metadata files and upload them to S3.

inputs:
  metadata_glob:
    description: Glob pattern for deployment metadata files to process.
    required: true
  manifest_dir:
    description: Local directory where manifest files will be written.
    required: true
  bucket:
    description: S3 bucket that stores deployment manifests.
    required: true
  bucket_prefix_root:
    description: S3 key root before component/status folders are appended.
    required: true
  project:
    description: Project name recorded in the manifest.
    required: true
  environment:
    description: Deployment environment recorded in the manifest.
    required: true
  status:
    description: Manifest status such as successful or failed.
    required: true
  reason:
    description: Human-readable reason captured from probe or rollback logic.
    required: true
  workflow_name:
    description: GitHub workflow name for traceability.
    required: true
  actor:
    description: GitHub actor that triggered the workflow.
    required: true
  summary_file:
    description: Optional markdown file to append a success summary to.
    required: false
    default: ""
  telemetry_status:
    description: Optional telemetry gate decision associated with the batch manifest write.
    required: false
    default: ""
  telemetry_reason:
    description: Optional telemetry summary associated with the batch manifest write.
    required: false
    default: ""
  evaluated_alarm_names:
    description: Optional comma-separated alarm names associated with the batch manifest write.
    required: false
    default: ""
  observation_window_minutes:
    description: Optional telemetry observation window associated with the batch manifest write.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob

        # ----- batch setup ----------------------------------------------------
        mkdir -p "${{ inputs.manifest_dir }}"

        # Batch manifest generation keeps the environment-level probe job intact while still
        # moving the repetitive manifest persistence logic into a reusable action.
        for METADATA_FILE in ${{ inputs.metadata_glob }}; do
          # ----- metadata extraction ------------------------------------------
          COMPONENT=$(jq -r '.component' "$METADATA_FILE")
          CLUSTER=$(jq -r '.cluster' "$METADATA_FILE")
          SERVICE=$(jq -r '.service' "$METADATA_FILE")
          PREVIOUS_TASK_DEF_ARN=$(jq -r '.previousTaskDefinitionArn // .previous_task_definition_arn' "$METADATA_FILE")
          NEW_TASK_DEF_ARN=$(jq -r '.newTaskDefinitionArn // .new_task_definition_arn' "$METADATA_FILE")
          IMAGE_URI=$(jq -r '.imageUri // .image_uri' "$METADATA_FILE")
          IMAGE_DIGEST=$(jq -r '.imageDigest // .image_digest' "$METADATA_FILE")
          IMAGE_TAG=$(jq -r '.imageTag // .image_tag' "$METADATA_FILE")
          RELEASE_VERSION=$(jq -r '.releaseVersion // .release_version' "$METADATA_FILE")
          SBOM_STATUS=$(jq -r '.sbomStatus // .sbom_status' "$METADATA_FILE")
          SBOM_ARTIFACT_NAME=$(jq -r '.sbomArtifactName // .sbom_artifact_name' "$METADATA_FILE")
          SCAN_STATUS=$(jq -r '.scanStatus // .scan_status' "$METADATA_FILE")
          COMMIT_SHA=$(jq -r '.commitSha // .commit_sha' "$METADATA_FILE")
          RUN_ID=$(jq -r '.workflowRunId // .workflow_run_id' "$METADATA_FILE")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MANIFEST_FILE="${{ inputs.manifest_dir }}/${COMPONENT}-${{ inputs.environment }}-${{ inputs.status }}-${GITHUB_RUN_ID}.json"
          MANIFEST_S3_KEY="${{ inputs.bucket_prefix_root }}/${COMPONENT}/${{ inputs.status }}/$(basename "$MANIFEST_FILE")"

          # ----- retention class resolution -----------------------------------
          if [ "${{ inputs.status }}" = "successful" ] || [ "${{ inputs.status }}" = "rolled_back" ]; then
            MANIFEST_CLASS="durable"
          else
            MANIFEST_CLASS="noisy"
          fi

          # ----- manifest document rendering ----------------------------------
          jq -n \
            --arg project "${{ inputs.project }}" \
            --arg environment "${{ inputs.environment }}" \
            --arg component "$COMPONENT" \
            --arg cluster "$CLUSTER" \
            --arg service "$SERVICE" \
            --arg previousTaskDefinitionArn "$PREVIOUS_TASK_DEF_ARN" \
            --arg taskDefinitionArn "$NEW_TASK_DEF_ARN" \
            --arg imageUri "$IMAGE_URI" \
            --arg imageDigest "$IMAGE_DIGEST" \
            --arg imageTag "$IMAGE_TAG" \
            --arg releaseVersion "$RELEASE_VERSION" \
            --arg sbomStatus "$SBOM_STATUS" \
            --arg sbomArtifactName "$SBOM_ARTIFACT_NAME" \
            --arg scanStatus "$SCAN_STATUS" \
            --arg commitSha "$COMMIT_SHA" \
            --arg telemetryStatus "${{ inputs.telemetry_status }}" \
            --arg telemetryReason "${{ inputs.telemetry_reason }}" \
            --arg evaluatedAlarmNames "${{ inputs.evaluated_alarm_names }}" \
            --arg observationWindowMinutes "${{ inputs.observation_window_minutes }}" \
            --arg workflowRunId "$RUN_ID" \
            --arg workflowName "${{ inputs.workflow_name }}" \
            --arg deployedBy "${{ inputs.actor }}" \
            --arg deployedAt "$TIMESTAMP" \
            --arg status "${{ inputs.status }}" \
            --arg reason "${{ inputs.reason }}" \
            '{
              project: $project,
              environment: $environment,
              component: $component,
              cluster: $cluster,
              service: $service,
              previousTaskDefinitionArn: ($previousTaskDefinitionArn | if . == "" or . == "null" then null else . end),
              taskDefinitionArn: $taskDefinitionArn,
              imageUri: ($imageUri | if . == "" or . == "null" then null else . end),
              imageDigest: ($imageDigest | if . == "" or . == "null" then null else . end),
              imageTag: ($imageTag | if . == "" or . == "null" then null else . end),
              releaseVersion: ($releaseVersion | if . == "" or . == "null" then null else . end),
              sbomStatus: ($sbomStatus | if . == "" or . == "null" then null else . end),
              sbomArtifactName: ($sbomArtifactName | if . == "" or . == "null" then null else . end),
              scanStatus: ($scanStatus | if . == "" or . == "null" then null else . end),
              commitSha: ($commitSha | if . == "" or . == "null" then null else . end),
              telemetryStatus: ($telemetryStatus | if . == "" or . == "null" then null else . end),
              telemetryReason: ($telemetryReason | if . == "" or . == "null" then null else . end),
              evaluatedAlarmNames: ($evaluatedAlarmNames | if . == "" or . == "null" then null else (. | split(",")) end),
              observationWindowMinutes: ($observationWindowMinutes | if . == "" or . == "null" then null else (. | tonumber) end),
              workflowRunId: $workflowRunId,
              workflowName: $workflowName,
              deployedBy: $deployedBy,
              deployedAt: $deployedAt,
              status: $status,
              reason: $reason
            }' > "$MANIFEST_FILE"

          # ----- manifest upload ----------------------------------------------
          # Tag manifest objects by retention class so S3 lifecycle can keep rollback-relevant
          # history longer than failure noise without relying on brittle key parsing rules.
          aws s3 cp "$MANIFEST_FILE" "s3://${{ inputs.bucket }}/$MANIFEST_S3_KEY" \
            --tagging "manifest_class=${MANIFEST_CLASS}&manifest_status=${{ inputs.status }}"

          # ----- manifest index refresh ---------------------------------------
          INDEX_KEY="${{ inputs.project }}/deployments/${{ inputs.environment }}/${COMPONENT}/manifest-index.json"
          INDEX_FILE="$(mktemp)"

          if ! aws s3 cp "s3://${{ inputs.bucket }}/$INDEX_KEY" "$INDEX_FILE" >/dev/null 2>&1; then
            jq -n \
              --arg project "${{ inputs.project }}" \
              --arg environment "${{ inputs.environment }}" \
              --arg component "$COMPONENT" \
              '{project: $project, environment: $environment, component: $component, updatedAt: null, entries: []}' > "$INDEX_FILE"
          fi

          UPDATED_INDEX_FILE="$(mktemp)"
          jq \
            --arg manifestS3Key "$MANIFEST_S3_KEY" \
            --arg status "${{ inputs.status }}" \
            --arg taskDefinitionArn "$NEW_TASK_DEF_ARN" \
            --arg previousTaskDefinitionArn "$PREVIOUS_TASK_DEF_ARN" \
            --arg imageUri "$IMAGE_URI" \
            --arg imageDigest "$IMAGE_DIGEST" \
            --arg imageTag "$IMAGE_TAG" \
            --arg releaseVersion "$RELEASE_VERSION" \
            --arg commitSha "$COMMIT_SHA" \
            --arg workflowRunId "$RUN_ID" \
            --arg workflowName "${{ inputs.workflow_name }}" \
            --arg deployedAt "$TIMESTAMP" \
            --arg reason "${{ inputs.reason }}" \
            '
            .updatedAt = $deployedAt
            | .entries = (
                [{
                  manifestS3Key: $manifestS3Key,
                  status: $status,
                  taskDefinitionArn: $taskDefinitionArn,
                  previousTaskDefinitionArn: ($previousTaskDefinitionArn | if . == "" or . == "null" then null else . end),
                  imageUri: ($imageUri | if . == "" or . == "null" then null else . end),
                  imageDigest: ($imageDigest | if . == "" or . == "null" then null else . end),
                  imageTag: ($imageTag | if . == "" or . == "null" then null else . end),
                  releaseVersion: ($releaseVersion | if . == "" or . == "null" then null else . end),
                  commitSha: ($commitSha | if . == "" or . == "null" then null else . end),
                  workflowRunId: $workflowRunId,
                  workflowName: $workflowName,
                  deployedAt: $deployedAt,
                  reason: $reason
                }]
                + ((.entries // []) | map(select(.manifestS3Key != $manifestS3Key)))
              )[:50]
            ' "$INDEX_FILE" > "$UPDATED_INDEX_FILE"

          aws s3 cp "$UPDATED_INDEX_FILE" "s3://${{ inputs.bucket }}/$INDEX_KEY"

          # ----- optional summary append --------------------------------------
          if [ -n "${{ inputs.summary_file }}" ]; then
            {
              echo "### ${COMPONENT} deployment ${{ inputs.status }} in ${{ inputs.environment }}"
              echo "- Task definition: \`$NEW_TASK_DEF_ARN\`"
              echo "- Image: \`$IMAGE_URI\`"
              echo "- Reason: ${{ inputs.reason }}"
              echo
            } >> "${{ inputs.summary_file }}"
          fi
        done
