name: AWS Fetch Network IDs
description: Look up a security group and subnet IDs for ECS task networking.

inputs:
  security_group_name:
    description: Security group name to look up.
    required: true
  subnet_tag_values:
    description: Comma-separated Name tag values for the target subnets.
    required: true

outputs:
  security_group_id:
    description: Resolved security group ID.
    value: ${{ steps.lookup.outputs.security_group_id }}
  subnet_ids_json:
    description: Subnet IDs formatted as compact JSON array text for ECS network configuration.
    value: ${{ steps.lookup.outputs.subnet_ids_json }}

runs:
  using: composite
  steps:
    - id: lookup
      shell: bash
      run: |
        set -euo pipefail

        # Resolve the security group once so callers do not repeat the same CLI block in every job.
        SG_ID=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=${{ inputs.security_group_name }}" \
          --query "SecurityGroups[0].GroupId" \
          --output text)

        # Keep subnets in JSON form because ECS awsvpc network-configuration expects an array-like value.
        SUBNETS=$(aws ec2 describe-subnets \
          --filters "Name=tag:Name,Values=${{ inputs.subnet_tag_values }}" \
          --query 'Subnets[*].SubnetId' \
          --output json | tr -d '\n' | tr -d ' ')

        if [ "$SG_ID" = "None" ] || [ -z "$SUBNETS" ]; then
          echo "Error: Could not find the requested security group or subnets."
          exit 1
        fi

        echo "security_group_id=$SG_ID" >> "$GITHUB_OUTPUT"
        echo "subnet_ids_json=$SUBNETS" >> "$GITHUB_OUTPUT"
