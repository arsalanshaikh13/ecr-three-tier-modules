name: Deployment History Resolve Rollback Target
description: Resolve the most appropriate rollback target from trusted SSM pointers plus S3 deployment history.

inputs:
  project:
    description: Project name used in the SSM parameter prefix and deployment-manifest paths.
    required: true
  environment:
    description: Deployment environment such as dev or prod.
    required: true
  component:
    description: Component name such as frontend or backend.
    required: true
  bucket:
    description: S3 bucket that stores deployment manifests and manifest indexes.
    required: true
  attempted_task_definition_arn:
    description: Task definition ARN that just failed validation and may need rollback.
    required: false
    default: ""

outputs:
  current_task_definition_arn:
    description: Current deployed task definition ARN from SSM, if present.
    value: ${{ steps.resolve.outputs.current_task_definition_arn }}
  last_known_good_task_definition_arn:
    description: Current trusted last-known-good task definition ARN from SSM, if present.
    value: ${{ steps.resolve.outputs.last_known_good_task_definition_arn }}
  parent_last_known_good_task_definition_arn:
    description: Previous trusted revision derived from the deployment manifest index, if present.
    value: ${{ steps.resolve.outputs.parent_last_known_good_task_definition_arn }}
  rollback_target_task_definition_arn:
    description: Final task definition ARN chosen as the rollback target.
    value: ${{ steps.resolve.outputs.rollback_target_task_definition_arn }}
  rollback_target_reason:
    description: Human-readable explanation of how the rollback target was chosen.
    value: ${{ steps.resolve.outputs.rollback_target_reason }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail

        # ----- input and lookup setup ----------------------------------------
        PARAMETER_PREFIX="/${{ inputs.project }}/${{ inputs.environment }}/${{ inputs.component }}"
        INDEX_KEY="${{ inputs.project }}/deployments/${{ inputs.environment }}/${{ inputs.component }}/manifest-index.json"
        ATTEMPTED_TASK_DEF_ARN="${{ inputs.attempted_task_definition_arn }}"

        # ----- trusted SSM pointer reads -------------------------------------
        CURRENT_TASK_DEFINITION_ARN=$(aws ssm get-parameter \
          --name "${PARAMETER_PREFIX}/current-task-definition-arn" \
          --query 'Parameter.Value' \
          --output text 2>/dev/null || true)

        LAST_KNOWN_GOOD_TASK_DEFINITION_ARN=$(aws ssm get-parameter \
          --name "${PARAMETER_PREFIX}/last-known-good-task-definition-arn" \
          --query 'Parameter.Value' \
          --output text 2>/dev/null || true)

        if [ -z "$CURRENT_TASK_DEFINITION_ARN" ] || [ "$CURRENT_TASK_DEFINITION_ARN" = "None" ]; then
          CURRENT_TASK_DEFINITION_ARN=""
        fi

        if [ -z "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] || [ "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" = "None" ]; then
          LAST_KNOWN_GOOD_TASK_DEFINITION_ARN=""
        fi

        # ----- parent lineage resolution from manifest index ------------------
        PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN=""
        if [ -n "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ]; then
          if aws s3 cp "s3://${{ inputs.bucket }}/$INDEX_KEY" manifest-index.json >/dev/null 2>&1; then
            PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN=$(jq -r \
              --arg taskDef "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" '
                (.entries // [])
                | map(select(.status == "successful" and .taskDefinitionArn == $taskDef))
                | sort_by(.deployedAt // "")
                | reverse
                | (.[0].previousTaskDefinitionArn // "")
              ' manifest-index.json)
          fi
        fi

        if [ -z "$PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] || [ "$PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" = "null" ]; then
          PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN=""
        fi

        TARGET_TASK_DEF_ARN="$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN"
        TARGET_REASON="Rollback defaulted to the trusted SSM last-known-good pointer."

        # ----- rollback target selection -------------------------------------
        # If the failing revision never became trusted, simply return the last-known-good
        # pointer. If the failing revision is itself the trusted current revision, step back
        # one more generation using the successful manifest history so rollback lands on the
        # parent good revision instead of bouncing to the same revision again.
        if [ -n "$ATTEMPTED_TASK_DEF_ARN" ] && [ -n "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] && [ "$ATTEMPTED_TASK_DEF_ARN" = "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] && [ -n "$PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ]; then
          TARGET_TASK_DEF_ARN="$PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN"
          TARGET_REASON="Rollback stepped back to the parent trusted revision recorded in deployment manifest history because the current trusted revision is the one failing."
        elif [ -n "$ATTEMPTED_TASK_DEF_ARN" ] && [ -n "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] && [ "$ATTEMPTED_TASK_DEF_ARN" != "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ]; then
          TARGET_REASON="Rollback used the trusted SSM last-known-good pointer because the attempted revision never became the accepted deployment."
        elif [ -n "$ATTEMPTED_TASK_DEF_ARN" ] && [ -n "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ] && [ "$ATTEMPTED_TASK_DEF_ARN" = "$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" ]; then
          TARGET_REASON="Rollback fell back to the trusted SSM last-known-good pointer because no parent trusted revision was found in deployment manifest history."
        fi

        # ----- action outputs -------------------------------------------------
        echo "current_task_definition_arn=$CURRENT_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"
        echo "last_known_good_task_definition_arn=$LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"
        echo "parent_last_known_good_task_definition_arn=$PARENT_LAST_KNOWN_GOOD_TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"
        echo "rollback_target_task_definition_arn=$TARGET_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
        echo "rollback_target_reason=$TARGET_REASON" >> "$GITHUB_OUTPUT"
